<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ML Lab — scikit-learn & statsmodels Learning Platform</title>
<meta name="description" content="Interactive ML model building platform. Learn, practise, and master scikit-learn and statsmodels."/>
<meta name="author" content="Adewale Samson Adeagbo"/>
<meta name="theme-color" content="#4f8aff"/>
<link rel="manifest" href="manifest.webmanifest"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════ VARIABLES ═══════════════════════════════ */
:root{
  --bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e2a;
  --surface:#1f2433;--surface2:#262b3d;
  --border:#2e3450;
  --accent:#4f8aff;--accent2:#7c5cfc;--accent3:#00e5a0;
  --red:#ff6b6b;--yellow:#ffd166;--green:#00e5a0;--purple:#7c5cfc;--blue:#4f8aff;
  --text:#e8eaf6;--text2:#9aa3c2;--text3:#5c6380;
  --code-bg:#0a0c12;--code-text:#a9b1d6;
  --sidebar-w:260px;--sidebar-closed:64px;
  --radius:12px;--radius-sm:8px;
  --transition:0.2s cubic-bezier(.4,0,.2,1);
}
[data-theme="light"]{
  --bg:#f0f2f8;--bg2:#e4e8f5;--bg3:#d8ddef;
  --surface:#fff;--surface2:#edf0fb;--border:#c8cfe8;
  --text:#1a1e2e;--text2:#3d4468;--text3:#7880a4;
  --code-bg:#1a1e2e;--code-text:#c0caf5;
}

/* ═══════════════════════════════════ RESET ═══════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

/* ═══════════════════════════════════ LAYOUT ══════════════════════════════════ */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width var(--transition);z-index:100;overflow:hidden}
.sidebar.closed{width:var(--sidebar-closed)}
.main{flex:1;margin-left:var(--sidebar-w);overflow-y:auto;transition:margin-left var(--transition)}
.main.closed{margin-left:var(--sidebar-closed)}
.page{max-width:1180px;margin:0 auto;padding:32px 28px 80px}

/* ═══════════════════════════════════ SIDEBAR ═════════════════════════════════ */
.sb-header{padding:18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;min-height:70px}
.sb-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-titles{flex:1;overflow:hidden}
.sb-title{font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}
.sb-sub{font-size:10px;color:var(--text3);white-space:nowrap}
.sb-toggle{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;border-radius:6px;font-size:14px;flex-shrink:0}
.sb-toggle:hover{color:var(--text);background:var(--surface)}
.streak-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:linear-gradient(90deg,rgba(255,209,102,.1),rgba(255,107,107,.07));border-bottom:1px solid rgba(255,209,102,.2);font-size:12px;font-weight:600;color:var(--yellow)}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-sec{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);padding:8px 8px 4px;white-space:nowrap;overflow:hidden}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:var(--radius-sm);cursor:pointer;transition:background var(--transition),color var(--transition);margin-bottom:2px;color:var(--text2);font-size:13px;font-weight:500;white-space:nowrap;position:relative}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,rgba(79,138,255,.15),rgba(124,92,252,.15));color:var(--accent);border:1px solid rgba(79,138,255,.2)}
.nav-item .ni{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.nav-item .nl{flex:1}
.nav-badge{font-size:9px;background:var(--accent3);color:var(--bg);font-weight:700;padding:1px 5px;border-radius:99px;flex-shrink:0}
.nav-new{font-size:9px;background:var(--yellow);color:var(--bg);font-weight:700;padding:1px 5px;border-radius:99px;flex-shrink:0}
.sb-footer{padding:14px;border-top:1px solid var(--border)}
.prog-mini{font-size:10px;color:var(--text3);margin-bottom:6px}
.prog-bar-wrap{height:4px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:10px}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .5s ease}
.theme-btn{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);font-family:inherit;font-size:12px;font-weight:500;padding:7px 10px;cursor:pointer;transition:all var(--transition);width:100%}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ═══════════════════════════════════ TYPOGRAPHY ══════════════════════════════ */
h1{font-size:26px;font-weight:800;line-height:1.2}
h2{font-size:20px;font-weight:700}
h3{font-size:16px;font-weight:600}
h4{font-size:13.5px;font-weight:600}
.tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:99px;background:rgba(79,138,255,.12);color:var(--accent);margin-bottom:10px}
.page-header{margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.page-header p{color:var(--text2);margin-top:8px;max-width:640px;font-size:14px}

/* ═══════════════════════════════════ CARDS ════════════════════════════════════ */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;transition:border-color var(--transition),box-shadow var(--transition)}
.card-sm{padding:14px}
.card-hover:hover{border-color:rgba(79,138,255,.4);transform:translateY(-2px);box-shadow:0 8px 28px rgba(79,138,255,.1)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}

/* ═══════════════════════════════════ BUTTONS ═════════════════════════════════ */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--radius-sm);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all var(--transition);border:none;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-ghost{background:none;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface);color:var(--text)}
.btn-green{background:linear-gradient(135deg,#00e5a0,#00b4d8);color:var(--bg)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-danger{background:rgba(255,107,107,.15);color:var(--red);border:1px solid rgba(255,107,107,.3)}
.btn-danger:hover{background:var(--red);color:#fff}

/* ═══════════════════════════════════ BADGES ══════════════════════════════════ */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:10.5px;font-weight:600}
.badge-blue{background:rgba(79,138,255,.15);color:var(--blue)}
.badge-green{background:rgba(0,229,160,.15);color:var(--green)}
.badge-red{background:rgba(255,107,107,.15);color:var(--red)}
.badge-yellow{background:rgba(255,209,102,.15);color:var(--yellow)}
.badge-purple{background:rgba(124,92,252,.15);color:var(--purple)}

/* ═══════════════════════════════════ INFO BOXES ══════════════════════════════ */
.info-box{border-radius:var(--radius-sm);padding:14px;margin:14px 0;border-left:3px solid;font-size:13px}
.info-box strong{display:block;margin-bottom:3px;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.info-box.tip{background:rgba(0,229,160,.07);border-color:var(--green)}
.info-box.tip strong{color:var(--green)}
.info-box.warn{background:rgba(255,209,102,.07);border-color:var(--yellow)}
.info-box.warn strong{color:var(--yellow)}
.info-box.note{background:rgba(79,138,255,.07);border-color:var(--accent)}
.info-box.note strong{color:var(--accent)}
.info-box.error{background:rgba(255,107,107,.07);border-color:var(--red)}
.info-box.error strong{color:var(--red)}

/* ═══════════════════════════════════ CODE ════════════════════════════════════ */
.code-block{background:var(--code-bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;font-family:'Space Mono',monospace;font-size:12px;line-height:1.85;overflow-x:auto;position:relative}
.code-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:7px}
.kw{color:#bb9af7}.fn{color:#7aa2f7}.str{color:#9ece6a}.num{color:#ff9e64}.cm{color:#565f89;font-style:italic}.cls{color:#73daca}.param{color:#e0af68}.op{color:#89ddff}.var{color:#c0caf5}
.editor-wrap{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.editor-toolbar{background:var(--bg3);border-bottom:1px solid var(--border);padding:9px 14px;display:flex;align-items:center;gap:8px}
.dot{width:11px;height:11px;border-radius:50%}
.dot-red{background:#ff5f56}.dot-yellow{background:#ffbd2e}.dot-green{background:#27c93f}
.editor-fname{font-size:11px;color:var(--text3);font-family:'Space Mono',monospace;margin-left:6px}
.editor-output{background:#070a0f;border-top:1px solid var(--border);padding:14px 18px;font-family:'Space Mono',monospace;font-size:11.5px;color:var(--accent3);min-height:70px;white-space:pre-wrap}
.out-label{font-size:9px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.1em}
.copy-btn{position:absolute;top:10px;right:10px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text3);font-size:10px;font-family:inherit;padding:3px 9px;cursor:pointer;transition:all var(--transition)}
.copy-btn:hover{color:var(--accent);border-color:var(--accent)}

/* ═══════════════════════════════════ FORMS ═══════════════════════════════════ */
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:13px;padding:9px 13px;transition:border-color var(--transition);outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;letter-spacing:.03em}
.form-group{margin-bottom:14px}
input[type="range"]{-webkit-appearance:none;height:4px;background:var(--surface2);border-radius:99px;padding:0}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg)}

/* ═══════════════════════════════════ TABS ════════════════════════════════════ */
.tabs{display:flex;gap:3px;margin-bottom:22px;border-bottom:1px solid var(--border)}
.tab{padding:9px 16px;font-size:12.5px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all var(--transition);background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ═══════════════════════════════════ TOPIC LIST ══════════════════════════════ */
.topic-list{display:flex;flex-direction:column;gap:6px}
.topic-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition)}
.topic-item:hover{border-color:var(--accent);background:var(--surface2)}
.topic-item.active{border-color:var(--accent);background:rgba(79,138,255,.08)}
.topic-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all var(--transition)}
.topic-check.done{background:var(--green);border-color:var(--green);color:var(--bg)}
.topic-title{font-size:13px;font-weight:500;flex:1}
.topic-meta{font-size:10.5px;color:var(--text3)}

/* ═══════════════════════════════════ QUIZ ════════════════════════════════════ */
.quiz-option{display:flex;align-items:center;gap:10px;padding:13px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition);font-size:13px;margin-bottom:7px;text-align:left;width:100%;font-family:inherit;color:var(--text)}
.quiz-option:hover:not(:disabled){border-color:var(--accent);background:var(--surface2)}
.quiz-option.correct{border-color:var(--green);background:rgba(0,229,160,.09);color:var(--green)}
.quiz-option.wrong{border-color:var(--red);background:rgba(255,107,107,.09);color:var(--red)}

/* ═══════════════════════════════════ MISC UTILS ══════════════════════════════ */
.flex{display:flex}.fc{display:flex;align-items:center}.fb{display:flex;align-items:center;justify-content:space-between}
.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}
.mt8{margin-top:8px}.mt16{margin-top:16px}.mt24{margin-top:24px}
.mb8{margin-bottom:8px}.mb16{margin-bottom:16px}.mb24{margin-bottom:24px}
.text-accent{color:var(--accent)}.text-green{color:var(--green)}.text-muted{color:var(--text2)}.text-dim{color:var(--text3)}
.mono{font-family:'Space Mono',monospace}
.divider{height:1px;background:var(--border);margin:22px 0}
.param-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.param-name{font-size:12px;font-weight:500;font-family:'Space Mono',monospace}
.param-val{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent);background:var(--code-bg);padding:1px 7px;border-radius:4px}
.explain-panel{background:rgba(79,138,255,.05);border:1px solid rgba(79,138,255,.2);border-radius:var(--radius);padding:18px;margin-top:14px}
.explain-panel h4{color:var(--accent);margin-bottom:10px;font-size:12px;text-transform:uppercase;letter-spacing:.05em}
.explain-panel p,.explain-panel li{color:var(--text2);font-size:13px;line-height:1.75}
.explain-panel ul{padding-left:18px}
.explain-panel code{background:var(--code-bg);color:var(--accent3);padding:1px 6px;border-radius:4px;font-family:'Space Mono',monospace;font-size:11px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:center}
.metric-val{font-size:28px;font-weight:800;line-height:1;margin-bottom:4px}
.metric-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.path-node{display:flex;align-items:flex-start;gap:14px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:7px;transition:all var(--transition);cursor:pointer}
.path-node:hover:not(.locked){border-color:var(--accent);background:var(--surface2)}
.path-node.done{border-color:rgba(0,229,160,.35);background:rgba(0,229,160,.03)}
.path-node.locked{opacity:.48;cursor:not-allowed}
.path-node-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:var(--surface2);border:2px solid var(--border)}
.path-node.done .path-node-icon{background:rgba(0,229,160,.12);border-color:var(--green)}
.path-connector{width:2px;height:20px;background:var(--border);margin-left:32px;border-radius:99px}
.path-connector.done{background:var(--green)}
.comparison-table{width:100%;border-collapse:collapse;font-size:12.5px}
.comparison-table th{background:var(--surface2);padding:10px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);border-bottom:2px solid var(--border)}
.comparison-table td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:top;line-height:1.55}
.comparison-table tr:hover td{background:var(--surface2)}
.yes{color:var(--green);font-weight:600}.no{color:var(--red);font-weight:600}.partial{color:var(--yellow);font-weight:600}
.formula-box{background:var(--code-bg);border-radius:8px;padding:12px 16px;font-family:'Space Mono',monospace;font-size:13px;color:var(--accent3);line-height:1.8;border-left:3px solid var(--accent);margin:10px 0}
.glossary-letter{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);padding:5px 0;margin-top:14px;border-bottom:1px solid var(--border);margin-bottom:7px}
.glossary-term{padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:5px;cursor:pointer;transition:all var(--transition)}
.glossary-term:hover,.glossary-term.expanded{border-color:rgba(79,138,255,.4);background:rgba(79,138,255,.04)}
.error-result{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-top:18px}
.error-result-header{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface2);border-bottom:1px solid var(--border)}
.error-result-body{padding:18px}
.scratchpad-editor{background:var(--code-bg);border:none;outline:none;color:var(--code-text);font-family:'Space Mono',monospace;font-size:12.5px;line-height:1.9;resize:none;width:100%;padding:18px;min-height:400px}
.scratchpad-toolbar{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--bg3);border-bottom:1px solid var(--border);flex-wrap:wrap}
.notes-fab{position:fixed;bottom:26px;right:200px;width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--yellow),#ff9e64);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 18px rgba(0,0,0,.3);transition:transform var(--transition),box-shadow var(--transition);z-index:500}
.notes-fab:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(0,0,0,.4)}
.notes-panel{position:fixed;bottom:80px;right:160px;width:300px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 14px 44px rgba(0,0,0,.4);z-index:500;overflow:hidden}
.notes-panel-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border)}

/* ── TOAST ── */
@keyframes slideUp{from{transform:translate(-50%,20px);opacity:0}to{transform:translate(-50%,0);opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:99px;font-size:13px;font-weight:600;z-index:9999;pointer-events:none;animation:slideUp .25s ease,fadeOut .4s ease 2.5s forwards;box-shadow:0 4px 22px rgba(0,0,0,.3)}
.toast-success{background:var(--green);color:var(--bg)}
.toast-error{background:var(--red);color:#fff}
.toast-info{background:var(--accent);color:#fff}
.shortcut-hint{position:fixed;bottom:9px;right:14px;font-size:10px;color:var(--text3);font-family:'Space Mono',monospace;pointer-events:none;opacity:.45}
@keyframes pageFade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.page-fade{animation:pageFade .2s ease both}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s ease infinite;margin-right:5px;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.streak-banner{display:flex;align-items:center;gap:7px;padding:7px 14px;background:linear-gradient(90deg,rgba(255,209,102,.1),rgba(255,107,107,.07));border-bottom:1px solid rgba(255,209,102,.2);font-size:11.5px;font-weight:600;color:var(--yellow)}

/* ── QUIZ ARENA ── */
.quiz-timer-bar{height:7px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:18px}
.quiz-timer-fill{height:100%;border-radius:99px;transition:width 1s linear,background .5s}

/* ── PROGRESS RING ── */
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
.ring-center{position:absolute;text-align:center}


/* ── PERSONA / GUIDE ENHANCEMENTS ── */
.persona-hero{position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(79,138,255,.12),rgba(124,92,252,.10),rgba(0,229,160,.06));border:1px solid rgba(79,138,255,.28);border-radius:var(--radius);padding:24px;margin-bottom:22px}
.persona-hero:before{content:"";position:absolute;right:-80px;top:-80px;width:230px;height:230px;background:radial-gradient(circle,rgba(0,229,160,.16),transparent 65%);pointer-events:none}
.persona-kicker{font-size:10px;color:var(--accent3);text-transform:uppercase;letter-spacing:.12em;font-weight:800;margin-bottom:8px}
.persona-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}
.persona-card{background:rgba(255,255,255,.03);border:1px solid rgba(79,138,255,.18);border-radius:10px;padding:14px;min-height:120px}
.persona-card h4{color:var(--accent);margin-bottom:6px;font-size:13px}
.persona-card p,.persona-card li{color:var(--text2);font-size:12.5px;line-height:1.75}
.step-list{counter-reset:step;display:flex;flex-direction:column;gap:10px}
.step-item{counter-increment:step;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 14px 14px 52px;position:relative}
.step-item:before{content:counter(step);position:absolute;left:14px;top:14px;width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.step-item h4{margin-bottom:5px;color:var(--text)}
.step-item p,.step-item li{font-size:13px;color:var(--text2);line-height:1.75}
.feature-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius);padding:16px;transition:all var(--transition)}
.feature-card:hover{border-color:rgba(79,138,255,.45);transform:translateY(-1px)}
.feature-card h3{font-size:14px;margin-bottom:6px}
.feature-card p,.feature-card li{font-size:12.5px;color:var(--text2);line-height:1.7}
.link-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border:1px solid var(--border);border-radius:999px;background:var(--surface2);color:var(--text2);font-size:11px;text-decoration:none;margin:3px 4px 3px 0}
.link-pill:hover{color:var(--accent);border-color:var(--accent)}
.local-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.25);color:var(--green);border-radius:999px;padding:4px 9px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .page{padding:18px 14px 60px}
  .grid2,.grid3{grid-template-columns:1fr}
  .sidebar{width:var(--sidebar-closed)}
  .main{margin-left:var(--sidebar-closed)}
  .shortcut-hint{display:none}
  .notes-fab{right:12px;bottom:70px}
  .notes-panel{right:6px;bottom:120px;width:calc(100vw - 12px)}
}
@media print{
  .sidebar,.shortcut-hint,.notes-fab,.toast,.theme-btn{display:none!important}
  .main{margin-left:0!important}
  body{background:#fff;color:#000}
  .card{break-inside:avoid;box-shadow:none;border:1px solid #ccc}
  .formula-box{background:#f0f0f0;color:#1a1e2e}
}

// ── STREAK ────────────────────────────────────────────────────────────────────
function updateStreak() {
  const today = new Date().toISOString().slice(0,10);
  const s = STATE.streak;
  if (s.lastDate === today) return;
  const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
  s.days = s.lastDate === yesterday ? s.days + 1 : 1;
  s.lastDate = today;
  localStorage.setItem('mlp_streak', JSON.stringify(s));
}
updateStreak();

// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast toast-'+type;
  t.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display='none'; }, 3100);
}

// ── MARK COMPLETE ─────────────────────────────────────────────────────────────
function markComplete(id) {
  if (!STATE.progress[id]) {
    STATE.progress[id] = true;
    saveProgress();
    showToast('✓ Marked complete!', 'success');
    logEvent('Progress complete', id);
    updateSidebarProgress();
  }
}

// ── THEME ─────────────────────────────────────────────────────────────────────
function applyTheme(t) {
  STATE.theme = t;
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('mlp_theme', t);
  const btn = document.getElementById('themeBtnText');
  const icon = btn ? btn.parentElement.firstChild : null;
  if (btn) btn.textContent = t==='dark' ? 'Light Mode' : 'Dark Mode';
  if (icon) icon.textContent = t==='dark' ? '☀️ ' : '🌙 ';
}
applyTheme(STATE.theme);

// ── SIDEBAR PROGRESS ──────────────────────────────────────────────────────────
const TOTAL_ITEMS = 48;
function updateSidebarProgress() {
  const done = Object.values(STATE.progress).filter(Boolean).length;
  const pct  = Math.min(100, Math.round((done/TOTAL_ITEMS)*100));
  const mini = document.getElementById('progMini');
  const fill = document.getElementById('progFill');
  if (mini) mini.textContent = `${done}/${TOTAL_ITEMS} complete · ${pct}%`;
  if (fill) fill.style.width = `${pct||1}%`;
}

function buildSidebar() {
  const nav = document.getElementById('sbNav');
  const open = STATE.sidebarOpen;
  let html = '';
  if (open) html += `<div class="nav-sec">Main</div>`;
  NAV_MAIN.forEach(n => {
    html += `<div class="nav-item ${STATE.page===n.id?'active':''}" onclick="navigate('${n.id}')" title="${!open?n.label+' (Alt+'+n.key+')':''}">
      <span class="ni">${n.icon}</span>
      ${open ? `<span class="nl">${n.label}</span>${n.badge?`<span class="nav-badge">${n.badge}</span>`:''}${n.key?`<span style="font-size:9px;background:var(--surface2);border:1px solid var(--border);color:var(--text3);padding:1px 5px;border-radius:4px;font-family:'Space Mono',monospace">Alt+${n.key}</span>`:''}` : ''}
    </div>`;
  });
  if (open) html += `<div class="nav-sec" style="margin-top:8px">Tools & Features</div>`;
  else html += `<div style="height:8px"></div>`;
  NAV_TOOLS.forEach(n => {
    html += `<div class="nav-item ${STATE.page===n.id?'active':''}" onclick="navigate('${n.id}')" title="${!open?n.label:''}">
      <span class="ni">${n.icon}</span>
      ${open ? `<span class="nl">${n.label}</span>${n.badge?`<span class="nav-new">${n.badge}</span>`:''}` : ''}
    </div>`;
  });
  nav.innerHTML = html;

  const sbTitles = document.getElementById('sbTitles');
  if (sbTitles) sbTitles.style.display = open ? 'block' : 'none';

  const footer = document.getElementById('sbFooterContent');
  if (footer) footer.style.display = open ? 'block' : 'none';

  const streak = document.getElementById('streakBanner');
  if (streak && STATE.streak.days >= 1) {
    streak.style.display = open ? 'flex' : 'none';
    document.getElementById('streakText').textContent = `${STATE.streak.days}-day streak`;
  }

  document.getElementById('sidebar').className = 'sidebar' + (open ? '' : ' closed');
  document.getElementById('main').className = 'main' + (open ? '' : ' closed');
  document.getElementById('sbToggle').textContent = open ? '◀' : '▶';
  updateSidebarProgress();
}

function navigate(page) {
  STATE.page = page;
  // stop any running quiz/timer when navigating away
  if (STATE.quizTimerInterval) { clearInterval(STATE.quizTimerInterval); STATE.quizTimerInterval = null; }
  render();
  buildSidebar();
  window.scrollTo(0,0);
}

// ── KEYBOARD SHORTCUTS ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const tag = e.target.tagName;
  if (tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT') return;
  if (!e.altKey) return;
  const map = {'1':'dashboard','2':'learn','3':'practice','4':'playground','5':'cheatsheet','6':'tracker','7':'glossary','8':'errordecoder','9':'scratchpad','q':'quiz','Q':'quiz','f':'formulas','F':'formulas'};
  if (map[e.key]) { e.preventDefault(); navigate(map[e.key]); }
  if (e.key==='b'||e.key==='B') { e.preventDefault(); STATE.sidebarOpen=!STATE.sidebarOpen; buildSidebar(); }
  if (e.key==='t'||e.key==='T') { e.preventDefault(); applyTheme(STATE.theme==='dark'?'light':'dark'); }
});

// ── NOTES FAB ─────────────────────────────────────────────────────────────────
let noteSaveTimer = null;
document.getElementById('notesFab').addEventListener('click', () => {
  STATE.notesOpen = !STATE.notesOpen;
  const panel = document.getElementById('notesPanel');
  panel.style.display = STATE.notesOpen ? 'block' : 'none';
  if (STATE.notesOpen) {
    const ta = document.getElementById('notesArea');
    ta.value = STATE.notes[STATE.currentLessonId] || '';
    document.getElementById('noteCharCount').textContent = ta.value.length + ' chars';
  }
});
function closeNotes() { STATE.notesOpen=false; document.getElementById('notesPanel').style.display='none'; }
function clearNote() {
  STATE.notes[STATE.currentLessonId] = '';
  document.getElementById('notesArea').value = '';
  document.getElementById('noteCharCount').textContent = '0 chars';
  saveNotes();
}
document.getElementById('notesArea').addEventListener('input', function() {
  STATE.notes[STATE.currentLessonId] = this.value;
  document.getElementById('noteCharCount').textContent = this.value.length + ' chars';
  clearTimeout(noteSaveTimer);
  noteSaveTimer = setTimeout(() => { saveNotes(); showToast('📝 Note saved','info'); }, 1500);
});

// ── SIDEBAR TOGGLE ────────────────────────────────────────────────────────────
document.getElementById('sbToggle').addEventListener('click', () => {
  STATE.sidebarOpen = !STATE.sidebarOpen;
  buildSidebar();
});
document.getElementById('themeBtn').addEventListener('click', () => {
  applyTheme(STATE.theme==='dark'?'light':'dark');
});

// ── COPY TO CLIPBOARD ─────────────────────────────────────────────────────────
function copyCode(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const text = el.innerText || el.textContent;
  navigator.clipboard.writeText(text).then(() => showToast('📋 Code copied!','success'));
}

// ── BOOKMARK HELPERS ──────────────────────────────────────────────────────────
function toggleBookmark(item) {
  const idx = STATE.bookmarks.findIndex(b => b.id === item.id);
  if (idx >= 0) { STATE.bookmarks.splice(idx,1); showToast('Bookmark removed','info'); }
  else { STATE.bookmarks.unshift({...item, savedAt: Date.now()}); showToast('🔖 Bookmarked!','success'); }
  saveBookmarks();
  render();
}
function isBookmarked(id) { return STATE.bookmarks.some(b => b.id===id); }

function bookmarkLesson(id) {
  const l = LESSONS.find(x=>x.id===id);
  if (!l) return;
  toggleBookmark({id:'lesson_'+l.id,type:'lesson',title:l.title,section:l.section});
}
function bookmarkCheat(id) {
  const c = CHEAT_ITEMS.find(x=>x.id===id);
  if (!c) return;
  toggleBookmark({id:'cheatsheet_'+c.id,type:'cheatsheet',title:c.title,section:c.sec});
}
function bookmarkFormula(id) {
  const f = FORMULAS.find(x=>x.id===id);
  if (!f) return;
  toggleBookmark({id:'formula_'+f.id,type:'formula',title:f.title,section:f.sec});
}
function bookmarkGlossary(term) {
  const g = GLOSSARY.find(x=>x.t===term);
  if (!g) return;
  toggleBookmark({id:'glossary_'+g.t,type:'glossary',title:g.t,section:g.cat});
}
function openBookmark(id) {
  const b = STATE.bookmarks.find(x=>x.id===id);
  if (!b) return;
  if (b.type==='lesson') {
    const idx = LESSONS.findIndex(l=>'lesson_'+l.id===id);
    if (idx>=0) { STATE.activeLesson=idx; STATE.activeSection=LESSONS[idx].section; }
    navigate('learn'); return;
  }
  if (b.type==='formula') { STATE.formulaExpanded[id.replace('formula_','')] = true; navigate('formulas'); return; }
  if (b.type==='cheatsheet') { STATE.cheatExpanded[id.replace('cheatsheet_','')] = true; navigate('cheatsheet'); return; }
  if (b.type==='glossary') { STATE.glossaryExpanded[b.title] = true; navigate('glossary'); return; }
  navigate('bookmarks');
}

{id:'L02',section:'Foundations',title:'Estimator API (fit/predict/transform)',difficulty:'Beginner',duration:'6 min',
description:'Every sklearn model follows the same 3-method pattern. Learn it once, use it everywhere.',
concepts:['fit()','predict()','transform()','fit_transform()'],
code:`<span class="kw">from</span> <span class="cls">sklearn.preprocessing</span> <span class="kw">import</span> <span class="cls">StandardScaler</span>
<span class="kw">from</span> <span class="cls">sklearn.ensemble</span> <span class="kw">import</span> <span class="cls">RandomForestClassifier</span>

<span class="cm"># ── TRANSFORMERS: fit → learn, transform → apply ─────────────────</span>
<span class="var">scaler</span> <span class="op">=</span> <span class="cls">StandardScaler</span>()
<span class="var">X_train_sc</span> <span class="op">=</span> <span class="var">scaler</span><span class="op">.</span><span class="fn">fit_transform</span>(<span class="var">X_train</span>)  <span class="cm"># fit ON train only</span>
<span class="var">X_test_sc</span>  <span class="op">=</span> <span class="var">scaler</span><span class="op">.</span><span class="fn">transform</span>(<span class="var">X_test</span>)      <span class="cm"># apply train stats to test</span>

<span class="cm"># ── ESTIMATORS: fit → learn, predict → output ───────────────────</span>
<span class="var">model</span> <span class="op">=</span> <span class="cls">RandomForestClassifier</span>(<span class="param">n_estimators</span><span class="op">=</span><span class="num">100</span>, <span class="param">random_state</span><span class="op">=</span><span class="num">42</span>)
<span class="var">model</span><span class="op">.</span><span class="fn">fit</span>(<span class="var">X_train_sc</span>, <span class="var">y_train</span>)
<span class="var">y_pred</span> <span class="op">=</span> <span class="var">model</span><span class="op">.</span><span class="fn">predict</span>(<span class="var">X_test_sc</span>)
<span class="var">y_prob</span> <span class="op">=</span> <span class="var">model</span><span class="op">.</span><span class="fn">predict_proba</span>(<span class="var">X_test_sc</span>)[:, <span class="num">1</span>]`,
output:`scaler.mean_  → [35.4, 2.1, 50200.0]
scaler.scale_ → [10.2, 0.9, 18400.0]
y_pred → [0, 1, 0, 0, 1, ...]
y_prob → [0.12, 0.89, 0.23, ...]`,
explanation:{why:'Scikit-learn uses the same API for every object — scalers, encoders, models. Once you know fit/predict/transform, you can use any of the 100+ estimators without re-learning.',
params:[{n:'fit(X_train)',d:'The learning step. Stores parameters (means, weights). ONLY call on training data.'},{n:'transform(X)',d:'Apply learned transformation. Call on BOTH train and test using TRAIN stats.'},{n:'predict(X)',d:'Returns class labels (0/1) for classifiers, numeric values for regressors.'},{n:'predict_proba(X)',d:'Returns probabilities per class. Column 1 = P(positive). Required for ROC-AUC.'}],
watchout:'fit_transform() ONLY on X_train. Calling on X_test leaks test statistics — data leakage.'},
quiz:{q:'Why should you never call fit_transform() on X_test?',opts:['It is too slow on test data','Test data has different columns','It leaks test statistics making evaluation unreliable','fit_transform only works on train data by design'],ans:2}},

{id:'L03',section:'Preprocessing',title:'Feature Scaling',difficulty:'Beginner',duration:'7 min',
description:'Scale numerical features so no single column dominates due to scale differences.',
concepts:['StandardScaler','MinMaxScaler','RobustScaler'],
code:`<span class="kw">from</span> <span class="cls">sklearn.preprocessing</span> <span class="kw">import</span> <span class="cls">StandardScaler</span>, <span class="cls">MinMaxScaler</span>, <span class="cls">RobustScaler</span>

<span class="cm"># ── StandardScaler: z = (x − mean) / std ────────────────────────</span>
<span class="cm"># Result: mean=0, std=1. Best general-purpose choice.</span>
<span class="var">ss</span> <span class="op">=</span> <span class="cls">StandardScaler</span>()
<span class="var">X_train_ss</span> <span class="op">=</span> <span class="var">ss</span><span class="op">.</span><span class="fn">fit_transform</span>(<span class="var">X_train</span>)
<span class="var">X_test_ss</span>  <span class="op">=</span> <span class="var">ss</span><span class="op">.</span><span class="fn">transform</span>(<span class="var">X_test</span>)

<span class="cm"># ── MinMaxScaler: (x − min) / (max − min) → [0, 1] ─────────────</span>
<span class="var">mm</span> <span class="op">=</span> <span class="cls">MinMaxScaler</span>()
<span class="var">X_train_mm</span> <span class="op">=</span> <span class="var">mm</span><span class="op">.</span><span class="fn">fit_transform</span>(<span class="var">X_train</span>)

<span class="cm"># ── RobustScaler: uses median + IQR — best for outliers ─────────</span>
<span class="var">rb</span> <span class="op">=</span> <span class="cls">RobustScaler</span>()
<span class="var">X_train_rb</span> <span class="op">=</span> <span class="var">rb</span><span class="op">.</span><span class="fn">fit_transform</span>(<span class="var">X_train</span>)`,
output:`StandardScaler — Mean: [35.4  2.1  50200.0]
StandardScaler — Std:  [10.2  0.9  18400.0]
After scaling: mean≈0.00, std≈1.00 ✓`,
explanation:{why:'Distance-based models (SVM, KNN, Logistic Regression) are sensitive to scale. A salary column with values in thousands will overpower an age column with values 0–100 unless both are scaled.',
params:[{n:'StandardScaler',d:'Best general-purpose. Makes mean=0, std=1. Use for most algorithms except tree-based ones.'},{n:'MinMaxScaler',d:'Compresses values to [0,1]. Sensitive to outliers. Use when range is bounded.'},{n:'RobustScaler',d:'Uses median and IQR. Best choice for income/salary columns with extreme outliers.'}],
watchout:'Tree-based models (RandomForest, GradientBoosting, XGBoost) do NOT need scaling — they split on thresholds, not distances.'},
quiz:{q:'Which scaler is MOST robust to extreme salary/income outliers?',opts:['StandardScaler','MinMaxScaler','RobustScaler','None — tree models do not need scaling'],ans:2}},

{id:'L04',section:'Preprocessing',title:'Encoding Categorical Features',difficulty:'Beginner',duration:'9 min',
description:'Convert text/category columns into numbers that ML models can process.',
concepts:['LabelEncoder','OrdinalEncoder','OneHotEncoder'],
code:`<span class="kw">from</span> <span class="cls">sklearn.preprocessing</span> <span class="kw">import</span> <span class="cls">LabelEncoder</span>, <span class="cls">OrdinalEncoder</span>, <span class="cls">OneHotEncoder</span>

<span class="cm"># ── LabelEncoder: for BINARY columns or TARGET only ──────────────</span>
<span class="var">le</span> <span class="op">=</span> <span class="cls">LabelEncoder</span>()
