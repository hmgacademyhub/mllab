const ERROR_DB = [
  {id:'e01',patterns:['notfittederror','not fitted','call fit','instance is not fitted'],title:'NotFittedError',sev:'error',plain:'You called .predict() or .transform() on an object that has never been trained. Every sklearn object must be fitted on data before it can be used.',cause:'Forgot to call .fit() before .predict()/.transform(), or the wrong object was saved/loaded.',fix:'# WRONG\nmodel = RandomForestClassifier()\ny_pred = model.predict(X_test)   # ❌\n\n# CORRECT\nmodel.fit(X_train, y_train)       # ✓ fit first\ny_pred = model.predict(X_test)    # ✓ then predict',tags:['beginner','fit/predict']},
  {id:'e02',patterns:['valueerror','shape','n_features','mismatch','expected','found'],title:'ValueError: Feature Shape Mismatch',sev:'error',plain:'The number of columns in your prediction data does not match what the model was trained on. The model memorised exactly N columns and cannot accept a different number.',cause:'You dropped or added a column between training and prediction, or forgot to apply the same preprocessing steps.',fix:'# ROOT CAUSE: manual preprocessing creates shape differences\n# WRONG: preprocessing train and test differently\nX_train_sc = scaler.fit_transform(X_train)\ny_pred = model.predict(X_test_raw)   # ❌ shape mismatch\n\n# CORRECT: use Pipeline so preprocessing is always identical\npipeline.fit(X_train, y_train)\ny_pred = pipeline.predict(X_test)    # ✓ same steps applied',tags:['pipeline','shape','intermediate']},
  {id:'e03',patterns:['convergencewarning','converge','max_iter','lbfgs','failed to converge'],title:'ConvergenceWarning: max_iter Reached',sev:'warning',plain:'The solver did not find the optimal solution within the maximum number of iterations. The result is approximate, not optimal.',cause:'max_iter is too low, OR features are not scaled (unscaled features make the optimiser work much harder).',fix:'# Fix 1 — scale features first (best fix)\nscaler = StandardScaler()\nX_train_sc = scaler.fit_transform(X_train)\nlr = LogisticRegression(max_iter=1000)\nlr.fit(X_train_sc, y_train)\n\n# Fix 2 — increase max_iter\nlr = LogisticRegression(max_iter=5000)',tags:['logistic regression','convergence','beginner']},
  {id:'e04',patterns:['fit_transform','test','leakage','data leak'],title:'Data Leakage — fit_transform on Test Set',sev:'warning',plain:'You called fit_transform() on X_test. The scaler learned statistics from the test set, contaminating your evaluation and making scores unrealistically optimistic.',cause:'Confusion between fit_transform() (learn + apply — train only) and transform() (apply learned stats — for all data).',fix:'# WRONG\nX_train_sc = scaler.fit_transform(X_train)\nX_test_sc  = scaler.fit_transform(X_test)   # ❌ LEAKAGE\n\n# CORRECT\nX_train_sc = scaler.fit_transform(X_train)  # ✓ learns from train\nX_test_sc  = scaler.transform(X_test)       # ✓ applies train stats',tags:['data leakage','scaler','critical']},
  {id:'e05',patterns:['keyerror','column','not in index'],title:'KeyError: Column Not Found',sev:'error',plain:'You are referencing a column name that does not exist in the DataFrame. Python column names are case-sensitive.',cause:'Typo in column name, column was dropped in a previous step, or pd.get_dummies() changed column names.',fix:'# Debug — always check available columns\nprint(df.columns.tolist())\n\n# Common fix — correct case-sensitive name\ndf["Credit_Score"]   # ❌ if actual name is "credit_score"\ndf["credit_score"]   # ✓',tags:['pandas','beginner']},
  {id:'e06',patterns:['typeerror','string','str','could not convert','non-numeric','object'],title:'TypeError: Non-Numeric Data',sev:'error',plain:'Your DataFrame contains text columns that sklearn cannot process. Models only accept numerical input — all categorical columns must be encoded first.',cause:'Forgot to encode categorical columns before calling .fit().',fix:'# Debug — find object columns\nprint(df.select_dtypes(include="object").columns.tolist())\n\n# Fix — encode with Pipeline\ncat_pipe = Pipeline([("encoder", OneHotEncoder(handle_unknown="ignore"))])\npreprocessor = ColumnTransformer([\n    ("num", StandardScaler(), num_cols),\n    ("cat", cat_pipe, cat_cols),\n])',tags:['encoding','dtype','beginner']},
  {id:'e07',patterns:['unknown categories','found unknown categories','handle_unknown'],title:'ValueError: Unknown Categories in OneHotEncoder',sev:'error',plain:'The test set contains a category that the encoder never saw during training. By default the encoder raises an error on unseen categories.',cause:'A category exists in X_test that was not in X_train. Common with small datasets or new production data.',fix:'# WRONG — default crashes on unseen categories\nohe = OneHotEncoder()   # handle_unknown="error" by default\n\n# CORRECT — output zeros for unseen categories\nohe = OneHotEncoder(handle_unknown="ignore")\nohe.fit(X_train[cat_cols])\nohe.transform(X_test[cat_cols])   # ✓ zeros for unknown',tags:['encoding','deployment','intermediate']},
  {id:'e08',patterns:['roc_auc','continuous','probabilities','roc auc'],title:'ValueError: roc_auc_score needs probabilities',sev:'error',plain:'You passed class labels (0 and 1) to roc_auc_score instead of probability scores. ROC-AUC only makes sense with probability values between 0 and 1.',cause:'Passing y_pred (from .predict()) instead of y_prob (from .predict_proba()[:,1]).',fix:'# WRONG — passing class labels\nauc = roc_auc_score(y_test, y_pred)    # ❌\n\n# CORRECT — passing probabilities\ny_prob = model.predict_proba(X_test)[:, 1]\nauc = roc_auc_score(y_test, y_prob)    # ✓',tags:['metrics','beginner']},

  const found = ERROR_DB.filter(e=>e.patterns.some(p=>txt.includes(p.replace(/[\s_-]/g,''))));

}

let scratchSaveTimer = null;
function insertSnippet(code) {
  const ta = document.getElementById('scratchArea');
  if (!ta) return;
  ta.value += '\n' + code + '\n';
  const t = STATE.scratchpad.find(t=>t.id===STATE.activeScratchTab);
  if (t) { t.content = ta.value; saveScratch(); showToast('Snippet inserted','success'); }
}
function addScratchTab() {
  const id = 'tab_'+Date.now();
  STATE.scratchpad.push({id, name:'Note '+(STATE.scratchpad.length+1), content:'# New note\n'});
  STATE.activeScratchTab = id;
  saveScratch(); render();
}
function deleteScratchTab(id) {
  if (STATE.scratchpad.length<=1) return;
  STATE.scratchpad = STATE.scratchpad.filter(t=>t.id!==id);
  if (STATE.activeScratchTab===id) STATE.activeScratchTab = STATE.scratchpad[0].id;
  saveScratch(); render();
}
function renameScratchTab(name) {
  const t = STATE.scratchpad.find(t=>t.id===STATE.activeScratchTab);
  if (t) { t.name = name; saveScratch(); }
}
function clearScratchTab() {
  const t = STATE.scratchpad.find(t=>t.id===STATE.activeScratchTab);
  if (t) { t.content=''; saveScratch(); render(); }
}
function copyAllScratch() {
  const t = STATE.scratchpad.find(t=>t.id===STATE.activeScratchTab);
  if (t) navigator.clipboard.writeText(t.content).then(()=>showToast('📋 Copied!','success'));
}
function downloadScratch() {
  const t = STATE.scratchpad.find(t=>t.id===STATE.activeScratchTab);
  if (!t) return;
  const blob = new Blob([t.content],{type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=t.name.replace(/\s+/g,'_')+'.py'; a.click();
  URL.revokeObjectURL(url);
}
function resetScratchpad() {
  STATE.scratchpad = JSON.parse(localStorage.getItem('mlp_scratchpad_default')||'null') || [{id:'tab1',name:'My Notes',content:'# My ML Notes\n'},{id:'tab2',name:'Code Drafts',content:'# Code Drafts\n'}];
  STATE.activeScratchTab = STATE.scratchpad[0].id;
  saveScratch(); render();
}

function shuffleArr(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function fmtSec(s){const m=Math.floor(s/60).toString().padStart(2,'0');return m+':'+String(s%60).padStart(2,'0');}

function startQuizGame() {
  const mode = QUIZ_MODES.find(m=>m.id===STATE.quizMode);
  let pool = STATE.quizSection==='All' ? QUIZ_BANK : QUIZ_BANK.filter(q=>q.sec===STATE.quizSection);
  if (mode.id==='speed') pool = pool.filter(q=>q.diff==='Intermediate');
  if (pool.length===0) pool = QUIZ_BANK;
  STATE.quizQuestions = shuffleArr(pool).slice(0, Math.min(mode.n, pool.length));
  STATE.quizIdx=0; STATE.quizAnswers=[]; STATE.quizChosen=null; STATE.quizRevealed=false;
  STATE.quizTotalTime=0;
  STATE.quizPhase='countdown'; STATE.quizCountdown=3;
  render();
  const ct = setInterval(()=>{
    STATE.quizCountdown--;
    if (STATE.quizCountdown<=0) { clearInterval(ct); STATE.quizPhase='playing'; STATE.quizTimeLeft=mode.time; startQuizTimer(); render(); }
    else render();
  },1000);
}

function startQuizTimer() {
  if (STATE.quizTimerInterval) clearInterval(STATE.quizTimerInterval);
  const mode = QUIZ_MODES.find(m=>m.id===STATE.quizMode);
  STATE.quizTimerInterval = setInterval(()=>{
    STATE.quizTimeLeft--;
    STATE.quizTotalTime++;
    const tf = document.getElementById('qtf');
    const td = document.getElementById('qtd');
    const tp = STATE.quizTimeLeft/mode.time;
    const tc = tp>.5?'var(--green)':tp>.25?'var(--yellow)':'var(--red)';
    if (tf) { tf.style.width=(tp*100)+'%'; tf.style.background=tc; }
    if (td) { td.textContent=fmtSec(STATE.quizTimeLeft); td.style.color=tc; }
    if (STATE.quizTimeLeft<=0) { clearInterval(STATE.quizTimerInterval); if(!STATE.quizRevealed) handleQuizAnswer(-1); }
  },1000);
}

function handleQuizAnswer(idx) {
  if (STATE.quizRevealed) return;
  clearInterval(STATE.quizTimerInterval);
  const mode = QUIZ_MODES.find(m=>m.id===STATE.quizMode);
  const q = STATE.quizQuestions[STATE.quizIdx];
  const correct = idx===q.ans;
  STATE.quizChosen=idx; STATE.quizRevealed=true;
  STATE.quizAnswers.push({correct, time:(mode.time-STATE.quizTimeLeft), timedOut:idx===-1});
  if (correct&&STATE.page==='quiz') showToast('✓ Correct!','success');
  render();
}

function quizNext() {
  const next = STATE.quizIdx+1;
  if (next>=STATE.quizQuestions.length) { STATE.quizPhase='result'; render(); return; }
  STATE.quizIdx=next; STATE.quizChosen=null; STATE.quizRevealed=false;
  const mode = QUIZ_MODES.find(m=>m.id===STATE.quizMode);
  STATE.quizTimeLeft=mode.time;
  render();
  startQuizTimer();
}

function saveQuizScore() {
  const name = (STATE.playerName||'Anonymous').trim();
  localStorage.setItem('mlp_player_name',name);
  const score = STATE.quizAnswers.filter(a=>a.correct).length;
  const pct   = Math.round((score/STATE.quizQuestions.length)*100);
  const mode  = QUIZ_MODES.find(m=>m.id===STATE.quizMode);
  const entry = {name,score,total:STATE.quizQuestions.length,pct,mode:mode.label,section:STATE.quizSection,date:new Date().toLocaleDateString(),ts:Date.now()};
  STATE.leaderboard = [entry,...STATE.leaderboard].slice(0,20);
  localStorage.setItem('mlp_leaderboard',JSON.stringify(STATE.leaderboard));
  showToast('🏆 Score saved!','success');
  render();
}

<div style="display:grid;grid-template-columns:1fr 300px;gap:22px">
  <div>

        <div style="font-weight:700;font-size:14px;margin-bottom:4px">${m.label}</div>
        <div style="font-size:12px;color:var(--text3);line-height:1.6">${m.desc}</div>
        ${STATE.quizMode===m.id?'<div style="margin-top:8px;font-size:11px;color:var(--accent);font-weight:600">✓ Selected</div>':''}

    </div>
    <h3 style="margin-bottom:10px">Filter Section</h3>
    <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:22px">
      ${SECS_AVAIL.map(s=>`<button class="btn btn-sm ${STATE.quizSection===s?'btn-primary':'btn-ghost'}" onclick="STATE.quizSection='${s}';render()">${s}</button>`).join('')}
    </div>
    ${mode?`<div class="info-box note mb-16"><strong>Config</strong>Mode: ${mode.label} · Questions: ${Math.min(mode.n, STATE.quizSection==='All'?QUIZ_BANK.length:QUIZ_BANK.filter(q=>q.sec===STATE.quizSection).length)} · Time/Q: ${mode.time}s · Section: ${STATE.quizSection}</div>`:''}
    <div class="form-group" style="max-width:280px;margin-bottom:18px"><label>Your Name (for leaderboard)</label><input type="text" value="${STATE.playerName||''}" onchange="STATE.playerName=this.value" placeholder="e.g. Adewale"/></div>
    <button class="btn btn-primary" style="font-size:15px;padding:13px 30px" ${!STATE.quizMode?'disabled':''} onclick="startQuizGame()">⚡ Start Arena</button>
  </div>
  <div>
    <div class="card">
      <h3 style="margin-bottom:14px">🏆 Leaderboard</h3>
      ${STATE.leaderboard.length===0?`<div style="text-align:center;padding:24px 0;color:var(--text3);font-size:13px">No scores yet. Complete a quiz!</div>`:
      `<div style="display:flex;flex-direction:column;gap:6px">
        ${STATE.leaderboard.slice(0,8).map((e,i)=>`<div style="display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--surface2);border-radius:8px;font-size:12px">
          <span style="font-size:15px;width:22px;text-align:center">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'🔹'}</span>
          <div style="flex:1"><div style="font-weight:600;font-size:12.5px">${e.name}</div><div style="color:var(--text3)">${e.mode}</div></div>
          <div style="text-align:right"><div style="font-weight:700;color:${e.pct>=80?'var(--green)':e.pct>=60?'var(--yellow)':'var(--red)'}">${e.pct}%</div><div style="color:var(--text3)">${e.score}/${e.total}</div></div>
        </div>`).join('')}
      </div>
      <button class="btn btn-ghost btn-sm" style="width:100%;margin-top:10px;color:var(--red);font-size:11px" onclick="STATE.leaderboard=[];localStorage.removeItem('mlp_leaderboard');render()">Clear Leaderboard</button>`}
    </div>
    <div class="card" style="margin-top:14px">
      <h4 style="margin-bottom:10px;color:var(--accent)">How It Works</h4>
      <ul style="font-size:12.5px;color:var(--text2);padding-left:18px;line-height:2.1">
        <li>Each question has a countdown timer</li>
        <li>Time out = wrong answer</li>
        <li>Green = correct · Red = wrong</li>
        <li>Grading: S(90%)A(80%)B(70%)C(60%)D(50%)F</li>
        <li>Save your score to the leaderboard</li>
      </ul>
    </div>
  </div>
</div>`;
  }

  // ── COUNTDOWN ──
  if (STATE.quizPhase==='countdown') {
    return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:20px">
      <div style="font-size:13px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em">Get Ready…</div>
      <div style="font-size:110px;font-weight:900;color:var(--accent);line-height:1">${STATE.quizCountdown}</div>
      <div style="font-size:15px;color:var(--text2)">${QUIZ_MODES.find(m=>m.id===STATE.quizMode)?.label} · ${STATE.quizQuestions.length} questions</div>
    </div>`;
  }

  // ── PLAYING ──
  if (STATE.quizPhase==='playing'&&STATE.quizQuestions.length>0) {
    const q = STATE.quizQuestions[STATE.quizIdx];
    const mode = QUIZ_MODES.find(m=>m.id===STATE.quizMode);
    const score = STATE.quizAnswers.filter(a=>a.correct).length;
    const tp = STATE.quizTimeLeft/mode.time;
    const tc = tp>.5?'var(--green)':tp>.25?'var(--yellow)':'var(--red)';
    return `<div style="max-width:680px;margin:0 auto">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px">
        <div style="flex:1;height:6px;background:var(--surface2);border-radius:99px;overflow:hidden"><div style="height:100%;width:${(STATE.quizIdx/STATE.quizQuestions.length)*100}%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .3s"></div></div>
        <span style="font-size:13px;font-weight:600;color:var(--text2);flex-shrink:0">${STATE.quizIdx+1}/${STATE.quizQuestions.length}</span>
        <span style="font-size:13px;font-weight:700;color:var(--green);flex-shrink:0">✓ ${score}</span>
      </div>
      <div style="margin-bottom:18px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:12px;color:var(--text3)">Time remaining</span>
          <span id="qtd" style="font-size:20px;font-weight:800;font-family:'Space Mono',monospace;color:${tc}">${fmtSec(STATE.quizTimeLeft)}</span>
        </div>
        <div class="quiz-timer-bar"><div id="qtf" style="height:100%;width:${tp*100}%;background:${tc};border-radius:99px;transition:width 1s linear"></div></div>
      </div>
      <div class="card mb-16">
        <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
          <span class="badge badge-blue">${q.sec}</span>
          <span class="badge ${q.diff==='Beginner'?'badge-green':q.diff==='Intermediate'?'badge-yellow':'badge-red'}">${q.diff}</span>
          <span style="font-size:11px;color:var(--text3);margin-left:auto">From: ${q.from}</span>
        </div>
        <p style="font-size:15px;font-weight:600;line-height:1.65;margin-bottom:22px">${q.q}</p>
        ${q.opts.map((opt,i)=>{
          let bg='var(--surface2)',col='var(--text)',bdr='var(--border)';
          if(STATE.quizRevealed){if(i===q.ans){bg='rgba(0,229,160,.12)';col='var(--green)';bdr='var(--green)';}else if(i===STATE.quizChosen&&i!==q.ans){bg='rgba(255,107,107,.12)';col='var(--red)';bdr='var(--red)';}}
          return `<button class="qa-btn" data-idx="${i}" ${STATE.quizRevealed?'disabled':''} style="display:flex;align-items:center;gap:10px;padding:13px 14px;background:${bg};border:1px solid ${bdr};border-radius:8px;cursor:${STATE.quizRevealed?'default':'pointer'};color:${col};font-size:13.5px;text-align:left;width:100%;font-family:inherit;margin-bottom:7px;transition:all .15s">
            <span style="width:26px;height:26px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;border:1px solid var(--border)">${String.fromCharCode(65+i)}</span>
            <span style="flex:1">${opt}</span>
            ${STATE.quizRevealed&&i===q.ans?'<span>✓</span>':''}
            ${STATE.quizRevealed&&i===STATE.quizChosen&&i!==q.ans?'<span>✗</span>':''}
            ${STATE.quizRevealed&&STATE.quizChosen===-1&&i===q.ans?'<span style="font-size:11px;color:var(--yellow)">⏰ was here</span>':''}
          </button>`;
        }).join('')}
        ${STATE.quizRevealed&&STATE.quizChosen===-1?`<div class="info-box warn" style="margin-top:10px"><strong>⏰ Time\'s Up!</strong>Correct answer: <strong style="color:var(--green)">${q.opts[q.ans]}</strong></div>`:''}
      </div>
      ${STATE.quizRevealed?`<div style="text-align:center"><button class="btn btn-primary" style="padding:12px 30px" onclick="quizNext()">${STATE.quizIdx+1>=STATE.quizQuestions.length?'See Results →':'Next Question →'}</button></div>`:''}
    </div>`;
  }

  // ── RESULT ──
  if (STATE.quizPhase==='result') {
    const score = STATE.quizAnswers.filter(a=>a.correct).length;
    const pct   = Math.round((score/STATE.quizQuestions.length)*100);
    const grade = pct>=90?'S':pct>=80?'A':pct>=70?'B':pct>=60?'C':pct>=50?'D':'F';
    const gcol  = pct>=80?'var(--green)':pct>=60?'var(--yellow)':'var(--red)';
    const msg   = pct>=90?'Outstanding! Mastery level.':pct>=80?'Excellent! Very strong.':pct>=70?'Good work! A few areas to revisit.':pct>=60?'Decent. Review wrong answers.':'Keep practising — revisit the Learn module.';
    const avgT  = STATE.quizAnswers.length?(STATE.quizAnswers.reduce((s,a)=>s+a.time,0)/STATE.quizAnswers.length).toFixed(1):0;
    return `<div style="max-width:640px;margin:0 auto">
      <div class="page-header"><div class="tag">Results</div><h1>Quiz Complete!</h1></div>
      <div class="card mb-16" style="text-align:center;background:linear-gradient(135deg,rgba(79,138,255,.06),rgba(124,92,252,.06));border-color:rgba(79,138,255,.3)">
        <div style="font-size:90px;font-weight:900;color:${gcol};line-height:1;margin-bottom:6px">${grade}</div>
        <div style="font-size:30px;font-weight:800;color:${gcol}">${pct}%</div>
        <div style="font-size:14px;color:var(--text2);margin-top:8px">${msg}</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px">
        ${[{l:'Correct',v:`${score}/${STATE.quizQuestions.length}`,c:'var(--green)'},{l:'Wrong',v:STATE.quizAnswers.filter(a=>!a.correct&&!a.timedOut).length,c:'var(--red)'},{l:'Timed Out',v:STATE.quizAnswers.filter(a=>a.timedOut).length,c:'var(--yellow)'},{l:'Avg Speed',v:avgT+'s',c:'var(--accent)'}].map(s=>`<div class="metric-card"><div class="metric-val" style="color:${s.c};font-size:20px">${s.v}</div><div class="metric-lbl">${s.l}</div></div>`).join('')}
      </div>
      <h3 style="margin-bottom:12px">Question Review</h3>
      <div style="display:flex;flex-direction:column;gap:7px;margin-bottom:22px">
        ${STATE.quizQuestions.map((q,i)=>{const a=STATE.quizAnswers[i];return `<div style="padding:11px 14px;background:var(--surface);border:1px solid ${a?.correct?'rgba(0,229,160,.3)':a?.timedOut?'rgba(255,209,102,.3)':'rgba(255,107,107,.3)'};border-radius:8px;font-size:13px;display:flex;gap:9px;align-items:flex-start">
          <span style="font-size:16px;flex-shrink:0">${a?.correct?'✅':a?.timedOut?'⏰':'❌'}</span>
          <div style="flex:1"><div style="font-weight:600;margin-bottom:3px">${q.q}</div><div style="color:var(--text3);font-size:12px">Correct: <span style="color:var(--green)">${q.opts[q.ans]}</span>${!a?.correct&&!a?.timedOut?` · Your answer: <span style="color:var(--red)">${q.opts[STATE.quizChosen]||'—'}</span>`:''}${a?.timedOut?'<span style="color:var(--yellow)"> · Timed out</span>':''}</div></div>
          <span style="font-size:11px;color:var(--text3);flex-shrink:0">${a?.time}s</span>
        </div>`;}).join('')}
      </div>
      <div class="card mb-16">
        <h4 style="margin-bottom:10px">Save to Leaderboard</h4>
        <div style="display:flex;gap:10px">
          <input type="text" value="${STATE.playerName||''}" onchange="STATE.playerName=this.value" placeholder="Your name" style="flex:1"/>
          <button class="btn btn-primary" onclick="saveQuizScore()">Save Score</button>
        </div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="STATE.quizPhase='lobby';render()">🔄 Play Again</button>
        <button class="btn btn-secondary" onclick="startQuizGame()">⚡ Same Config</button>
      </div>
    </div>`;
  }
  return renderQuizArena();
}

const FORMULAS = [
  {id:'f01',sec:'Classification Metrics',title:'Accuracy',formula:'Accuracy = (TP + TN) / (TP + TN + FP + FN)',vars:[{s:'TP',d:'True Positives'},{s:'TN',d:'True Negatives'},{s:'FP',d:'False Positives'},{s:'FN',d:'False Negatives'}],plain:'Of all predictions, what fraction was correct? Simple and intuitive but misleading on imbalanced data.',code:'accuracy_score(y_test, y_pred)',when:'Classes are roughly balanced (50/50 or 60/40).',avoid:'Churn, fraud, medical — a model predicting majority class always scores well.',color:'var(--accent)'},
  {id:'f02',sec:'Classification Metrics',title:'Precision',formula:'Precision = TP / (TP + FP)',vars:[{s:'TP',d:'True Positives'},{s:'FP',d:'False Positives (false alarms)'}],plain:'Of all samples predicted as positive, what fraction actually are? High precision = fewer false alarms.',code:'precision_score(y_test, y_pred)',when:'False positives are costly — e.g. spam filter (don\'t flag real emails).',avoid:'When missing positives is costly — Precision can be gamed by predicting positive very rarely.',color:'var(--purple)'},
  {id:'f03',sec:'Classification Metrics',title:'Recall (Sensitivity)',formula:'Recall = TP / (TP + FN)',vars:[{s:'TP',d:'True Positives'},{s:'FN',d:'False Negatives — missed positives'}],plain:'Of all actual positives, what fraction did the model catch? High recall = fewer missed cases.',code:'recall_score(y_test, y_pred)',when:'Missing a positive is costly — cancer screening, churn detection.',avoid:'Recall can be gamed by predicting positive for every sample.',color:'var(--red)'},
  {id:'f04',sec:'Classification Metrics',title:'F1 Score',formula:'F1 = 2 × (Precision × Recall) / (Precision + Recall)',vars:[{s:'Precision',d:'TP/(TP+FP)'},{s:'Recall',d:'TP/(TP+FN)'}],plain:'Harmonic mean of Precision and Recall. High F1 requires BOTH to be high. Best single metric for imbalanced classification.',code:'f1_score(y_test, y_pred)  # binary\nf1_score(y_test, y_pred, average="weighted")  # multiclass',when:'Imbalanced classification — churn, fraud, medical diagnosis.',avoid:'When you specifically need to emphasise precision OR recall more.',color:'var(--green)'},
  {id:'f05',sec:'Regression Metrics',title:'MAE (Mean Absolute Error)',formula:'MAE = (1/n) × Σ |yᵢ − ŷᵢ|',vars:[{s:'n',d:'Number of samples'},{s:'yᵢ',d:'Actual value'},{s:'ŷᵢ',d:'Predicted value'}],plain:'Average of absolute differences. Interpretable in original units. Less sensitive to outliers than RMSE.',code:'mean_absolute_error(y_test, y_pred)',when:'Interpretable error in original units. Outliers should not be penalised heavily.',avoid:'When large errors must be penalised more — use RMSE instead.',color:'var(--yellow)'},
  {id:'f06',sec:'Regression Metrics',title:'RMSE (Root Mean Squared Error)',formula:'RMSE = √[ (1/n) × Σ (yᵢ − ŷᵢ)² ]',vars:[{s:'n',d:'Number of samples'},{s:'yᵢ',d:'Actual value'},{s:'ŷᵢ',d:'Predicted value'}],plain:'Square root of MSE — back in original units. Penalises large errors more than MAE. Most widely reported regression metric.',code:'import numpy as np\nnp.sqrt(mean_squared_error(y_test, y_pred))',when:'Primary regression metric. Large errors should be penalised heavily.',avoid:'When target has extreme outliers that inflate RMSE artificially — use MAE.',color:'var(--accent)'},
  {id:'f07',sec:'Regression Metrics',title:'R² (R-squared)',formula:'R² = 1 − (SS_res / SS_tot)  where SS_res=Σ(yᵢ−ŷᵢ)², SS_tot=Σ(yᵢ−ȳ)²',vars:[{s:'SS_res',d:'Sum of squared residuals (model error)'},{s:'SS_tot',d:'Total variance in y'},{s:'ȳ',d:'Mean of actual y values'}],plain:'Proportion of variance in y explained by the model. R²=1 perfect, R²=0 as good as mean, R²<0 worse than mean.',code:'r2_score(y_test, y_pred)',when:'Comparing models on same dataset. Intuitive for stakeholders.',avoid:'Comparing models trained on different datasets.',color:'var(--green)'},
  {id:'f08',sec:'Regularisation',title:'Ridge (L2) Loss',formula:'Loss_Ridge = Σ(yᵢ−ŷᵢ)² + α × Σ(βⱼ²)',vars:[{s:'Σ(yᵢ−ŷᵢ)²',d:'OLS loss — minimise residuals'},{s:'α',d:'Regularisation strength (alpha)'},{s:'Σ(βⱼ²)',d:'L2 penalty — sum of squared coefficients'}],plain:'Ridge adds a penalty proportional to the square of each coefficient. Forces small coefficients — never zeros them out completely.',code:'Ridge(alpha=1.0)  # higher alpha = stronger regularisation',when:'Multicollinearity (correlated features). Keep all features with small weights.',avoid:'Feature selection — Ridge keeps all features. Use Lasso instead.',color:'var(--blue)'},
  {id:'f09',sec:'Regularisation',title:'Lasso (L1) Loss',formula:'Loss_Lasso = Σ(yᵢ−ŷᵢ)² + α × Σ|βⱼ|',vars:[{s:'Σ(yᵢ−ŷᵢ)²',d:'OLS loss'},{s:'α',d:'Regularisation strength'},{s:'Σ|βⱼ|',d:'L1 penalty — sum of absolute coefficients'}],plain:'Lasso adds a penalty proportional to the absolute value of each coefficient. Can shrink some coefficients to exactly zero — automatic feature selection.',code:'Lasso(alpha=0.1)  # some coefficients become exactly 0.0',when:'Feature selection in high-dimensional datasets.',avoid:'Correlated features — Lasso arbitrarily drops one. Use ElasticNet.',color:'var(--accent3)'},
  {id:'f10',sec:'Model Theory',title:'Bias-Variance Decomposition',formula:'Total Error = Bias² + Variance + Irreducible Noise',vars:[{s:'Bias²',d:'Error from wrong assumptions — underfitting'},{s:'Variance',d:'Sensitivity to training data — overfitting'},{s:'Irreducible Noise',d:'Inherent data noise — cannot be reduced'}],plain:'Every model\'s error has three components. Increasing complexity reduces bias but raises variance. The goal is to minimise total error.',code:'# High bias (underfit):\nDecisionTreeClassifier(max_depth=1)\n# Sweet spot:\nRandomForestClassifier(n_estimators=100, max_depth=5)',when:'Diagnosing whether your model is underfitting or overfitting.',avoid:'N/A — this is a conceptual framework.',color:'var(--accent2)'},
  {id:'f11',sec:'Model Theory',title:'Z-Score (StandardScaler)',formula:'z = (x − μ) / σ',vars:[{s:'x',d:'Original feature value'},{s:'μ',d:'Mean (learned from X_train)'},{s:'σ',d:'Standard deviation (learned from X_train)'}],plain:'Transforms each feature to mean=0 and std=1. This is exactly what StandardScaler computes, making features comparable regardless of original scale.',code:'StandardScaler().fit_transform(X_train)\n# Equivalent to: (X_train - X_train.mean()) / X_train.std()',when:'Before LogReg, SVM, KNN — any distance or gradient based algorithm.',avoid:'Tree-based models (RF, GB) — they don\'t use distances.',color:'var(--accent)'},
  {id:'f12',sec:'Model Theory',title:'Sigmoid Function (Logistic Regression)',formula:'σ(z) = 1 / (1 + e^(−z))  where z = β₀ + β₁x₁ + ... + βₙxₙ',vars:[{s:'z',d:'Linear combination of features and coefficients'},{s:'e',d:'Euler\'s number ≈ 2.718'},{s:'β',d:'Learned coefficients'}],plain:'Maps any real number to (0,1) — a probability. LogisticRegression computes z (a linear sum) then squashes through sigmoid to get a class probability.',code:'y_prob = model.predict_proba(X_test)[:, 1]  # sigmoid output\ny_pred = (y_prob >= 0.5).astype(int)          # threshold',when:'Understanding why LogReg outputs are bounded to [0,1] and why it needs scaling.',avoid:'N/A — applied internally.',color:'var(--purple)'},
  {id:'f13',sec:'Information Theory',title:'Gini Impurity',formula:'Gini = 1 − Σ(pᵢ²)  where pᵢ = fraction of class i',vars:[{s:'pᵢ',d:'Fraction of samples in class i at a node'},{s:'Σ',d:'Sum over all classes'}],plain:'Measures probability of misclassifying a randomly chosen sample. Gini=0 means pure node (all same class). Used by Decision Trees and Random Forest to choose the best split.',code:'DecisionTreeClassifier(criterion="gini")  # default',when:'Used internally by tree models — understanding it explains feature_importances_.',avoid:'N/A — computed internally.',color:'var(--green)'},
  {id:'f14',sec:'Information Theory',title:'Cross-Entropy Loss',formula:'Log Loss = −(1/n) × Σ[yᵢ·log(pᵢ) + (1−yᵢ)·log(1−pᵢ)]',vars:[{s:'yᵢ',d:'Actual label (0 or 1)'},{s:'pᵢ',d:'Predicted probability of class 1'},{s:'log',d:'Natural logarithm'}],plain:'The loss function used by Logistic Regression internally. Penalises confident wrong predictions very heavily. Minimising log loss = maximum likelihood estimation.',code:'from sklearn.metrics import log_loss\nlog_loss(y_test, y_prob)  # lower is better',when:'Comparing probabilistic classifiers.',avoid:'When you care about threshold decisions — use F1 or AUC.',color:'var(--red)'},
];

function renderFormulas() {
  const search = (STATE.filterSearch||'').toLowerCase();
  const secFilter = STATE.filterSection||'All';
  const secs = ['All',...new Set(FORMULAS.map(f=>f.sec))];
  const filtered = FORMULAS.filter(f=>(secFilter==='All'||f.sec===secFilter)&&(!search||f.title.toLowerCase().includes(search)||f.plain.toLowerCase().includes(search)));
  const bySec = [...new Set(filtered.map(f=>f.sec))].map(s=>({s,items:filtered.filter(f=>f.sec===s)}));

  return `
<div class="page-header">
  <div class="tag">Formula Reference</div>
  <h1>ML Formula Reference</h1>
  <p>${FORMULAS.length} ML formulas — mathematical notation, variable definitions, plain-English meaning, sklearn code, and when to use each.</p>
  <span class="badge badge-blue">${FORMULAS.length} formulas</span>
</div>
<div style="display:flex;gap:10px;margin-bottom:13px;flex-wrap:wrap">
  <input type="text" placeholder="Search formulas..." value="${STATE.filterSearch||''}" oninput="STATE.filterSearch=this.value;render()" style="flex:1;min-width:180px"/>
</div>
<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:22px">
  ${secs.map(s=>`<button class="btn btn-sm ${secFilter===s?'btn-primary':'btn-ghost'}" onclick="STATE.filterSection='${s}';render()">${s}</button>`).join('')}
</div>
${bySec.map(g=>`
<div style="margin-bottom:28px">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:13px"><div style="width:4px;height:18px;background:var(--accent);border-radius:2px"></div><h2 style="font-size:15px">${g.s}</h2><span class="badge badge-blue">${g.items.length}</span></div>
  ${g.items.map(f=>`
  <div class="card card-sm" style="border-left:3px solid ${f.color};cursor:pointer;margin-bottom:8px" onclick="STATE.formulaExpanded['${f.id}']=!STATE.formulaExpanded['${f.id}'];render()">
    <div class="fb">

    <div style="margin-top:14px">

        ${f.vars.map(v=>`<div style="display:flex;gap:10px;align-items:flex-start"><code style="background:var(--code-bg);color:${f.color};padding:2px 7px;border-radius:4px;font-size:11px;font-family:'Space Mono',monospace;flex-shrink:0;min-width:70px;text-align:center">${v.s}</code><span style="font-size:13px;color:var(--text2);line-height:1.6">${v.d}</span></div>`).join('')}

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="info-box tip"><strong>✅ Use When</strong>${f.when}</div>
        <div class="info-box warn"><strong>⚠ Avoid When</strong>${f.avoid}</div>
      </div>
    </div>`:''}
  </div>`).join('')}
</div>`).join('')}
${filtered.length===0?`<div style="text-align:center;padding:48px;color:var(--text3)"><div style="font-size:36px;margin-bottom:12px">🔍</div><p>No results for "${STATE.filterSearch}"</p></div>`:''}`;
}

// PAGE: SESSION TIMER
// ════════════════════════════════════════════════════════════════════════════════
const POM_PRESETS = [
  {label:'25/5 Classic',  work:25*60, rest:5*60},
  {label:'50/10 Deep',    work:50*60, rest:10*60},
  {label:'15/3 Sprint',   work:15*60, rest:3*60},
  {label:'45/15 Study',   work:45*60, rest:15*60},
];

function fmtDur(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;if(h>0)return `${h}h ${m}m`;if(m>0)return `${m}m ${s%60}s`;return `${sec}s`;}
function fmtDate(ts){return new Date(ts).toLocaleDateString('en-NG',{weekday:'short',month:'short',day:'numeric'});}

function startTimerInterval() {
  clearInterval(STATE.timerInterval);
  if (STATE.timerMode==='stopwatch') {
    STATE.timerInterval = setInterval(()=>{
      STATE.timerElapsed++;
      const el = document.getElementById('stopwatchDisplay');
      if (el) el.textContent = fmtDur(STATE.timerElapsed);
    },1000);
  } else {
    STATE.timerInterval = setInterval(()=>{
      STATE.pomLeft--;
      const ring = document.getElementById('pomFill');
      const txt  = document.getElementById('pomTime');
      const total = STATE.pomPhase==='work'?STATE.pomPreset.work:STATE.pomPreset.rest;
      const pct   = STATE.pomLeft/total;
      const circ  = 2*Math.PI*54;
      if (ring) ring.setAttribute('stroke-dasharray',`${circ*pct} ${circ}`);
      if (txt)  txt.textContent = String(Math.floor(STATE.pomLeft/60)).padStart(2,'0')+':'+String(STATE.pomLeft%60).padStart(2,'0');
      if (STATE.pomLeft<=0) {
        clearInterval(STATE.timerInterval);
        STATE.timerRunning=false;
        if (STATE.pomPhase==='work') {
          const entry={label:`Pomodoro ${STATE.pomPreset.label} Round ${STATE.pomRound}`,duration:STATE.pomPreset.work,date:Date.now()};
          STATE.sessionLog=[entry,...STATE.sessionLog]; saveSession();
          showToast('✅ Work session done! Take a break.','success');
          STATE.pomPhase='rest'; STATE.pomLeft=STATE.pomPreset.rest;
        } else {
          showToast('🔥 Break over! Start next round.','info');
          STATE.pomPhase='work'; STATE.pomLeft=STATE.pomPreset.work; STATE.pomRound++;
        }
        render();
      }
    },1000);
  }
}

function renderTimer() {
  const todayDone = STATE.sessionLog.filter(s=>fmtDate(s.date)===fmtDate(Date.now())).reduce((t,s)=>t+s.duration,0);
  const totalDone = STATE.sessionLog.reduce((t,s)=>t+s.duration,0);
  const longest   = STATE.sessionLog.length?Math.max(...STATE.sessionLog.map(s=>s.duration)):0;
  const avg       = STATE.sessionLog.length?Math.round(totalDone/STATE.sessionLog.length):0;
  const total = STATE.timerMode==='pomodoro'?(STATE.pomPhase==='work'?STATE.pomPreset.work:STATE.pomPreset.rest):0;
  const pomPct = total>0?STATE.pomLeft/total:1;
  const CIRC = 2*Math.PI*54;

  return `
<div class="page-header">
  <div class="tag">Session Timer</div>
  <h1>Session Timer</h1>
  <p>Track study time with a stopwatch or Pomodoro technique. Sessions saved to local history. Use data to stay consistent and build your streak.</p>
</div>
<div class="tabs">
  <button class="tab ${STATE.timerMode==='stopwatch'?'active':''}" onclick="STATE.timerMode='stopwatch';clearInterval(STATE.timerInterval);STATE.timerRunning=false;render()">⏱ Stopwatch</button>
  <button class="tab ${STATE.timerMode==='pomodoro'?'active':''}" onclick="STATE.timerMode='pomodoro';clearInterval(STATE.timerInterval);STATE.timerRunning=false;render()">🍅 Pomodoro</button>
</div>
<div style="display:grid;grid-template-columns:1fr 300px;gap:22px">
  <div>
    ${STATE.timerMode==='stopwatch'?`
    <div class="card mb-16" style="text-align:center">
      <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px">Elapsed Time</div>
      <div id="stopwatchDisplay" style="font-size:68px;font-weight:900;font-family:'Space Mono',monospace;color:${STATE.timerRunning?'var(--green)':'var(--text)'};letter-spacing:.04em;line-height:1;margin-bottom:22px">${fmtDur(STATE.timerElapsed)}</div>
      <div class="form-group" style="max-width:280px;margin:0 auto 18px"><label>Session Label</label><input type="text" id="timerLabel" placeholder="e.g. Pipelines practice" value="${STATE.timerLabel||''}"/></div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn ${STATE.timerRunning?'btn-secondary':'btn-primary'}" style="min-width:110px" onclick="
          STATE.timerLabel=document.getElementById('timerLabel')?.value||'Study Session';
          STATE.timerRunning=!STATE.timerRunning;
          if(STATE.timerRunning)startTimerInterval();
          else clearInterval(STATE.timerInterval);
          render()">
          ${STATE.timerRunning?'⏸ Pause':STATE.timerElapsed>0?'▶ Resume':'▶ Start'}
        </button>
        ${STATE.timerElapsed>0?`
        <button class="btn btn-green" onclick="
          if(STATE.timerElapsed>=10){
            const entry={label:STATE.timerLabel||'Study Session',duration:STATE.timerElapsed,date:Date.now()};
            STATE.sessionLog=[entry,...STATE.sessionLog];saveSession();
            STATE.timerElapsed=0;STATE.timerRunning=false;clearInterval(STATE.timerInterval);
            showToast('✅ Session saved!','success');render();
          }">💾 Save</button>
        <button class="btn btn-ghost btn-sm" onclick="STATE.timerElapsed=0;STATE.timerRunning=false;clearInterval(STATE.timerInterval);render()">↺ Reset</button>`:''}
      </div>
      ${STATE.timerRunning?`<div style="margin-top:18px;font-size:12px;color:var(--text3)"><span class="live-dot"></span>Session in progress…</div>`:''}
    </div>`:`
    <div class="card mb-16">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">
        ${POM_PRESETS.map((p,i)=>`<button class="btn btn-sm ${JSON.stringify(STATE.pomPreset)===JSON.stringify(p)?'btn-primary':'btn-ghost'}" onclick="STATE.pomPreset=${JSON.stringify(p)};STATE.pomPhase='work';STATE.pomLeft=${p.work};STATE.pomRound=1;STATE.timerRunning=false;clearInterval(STATE.timerInterval);render()">${p.label}</button>`).join('')}
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:22px">
        <div style="position:relative;width:160px;height:160px">
          <svg width="160" height="160" viewBox="0 0 160 160">
            <circle cx="80" cy="80" r="54" fill="none" stroke="var(--surface2)" stroke-width="10"/>
            <circle id="pomFill" cx="80" cy="80" r="54" fill="none" stroke="${STATE.pomPhase==='work'?'var(--accent)':'var(--green)'}" stroke-width="10" stroke-dasharray="${CIRC*pomPct} ${CIRC}" stroke-linecap="round" transform="rotate(-90 80 80)" style="transition:stroke-dasharray 1s linear"/>
          </svg>
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center">
            <div id="pomTime" style="font-size:28px;font-weight:800;font-family:'Space Mono',monospace;color:${STATE.pomPhase==='work'?'var(--accent)':'var(--green)'}">${String(Math.floor(STATE.pomLeft/60)).padStart(2,'0')}:${String(STATE.pomLeft%60).padStart(2,'0')}</div>
            <div style="font-size:11px;color:var(--text3);text-transform:uppercase">${STATE.pomPhase==='work'?'🔥 Focus':'☕ Rest'}</div>
          </div>
        </div>
        <div style="font-size:13px;color:var(--text3);margin-top:10px">Round <strong style="color:var(--text)">${STATE.pomRound}</strong> · ${STATE.pomPhase==='work'?Math.round(STATE.pomPreset.work/60)+'min work':Math.round(STATE.pomPreset.rest/60)+'min rest'}</div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn ${STATE.timerRunning?'btn-secondary':'btn-primary'}" style="min-width:110px" onclick="STATE.timerRunning=!STATE.timerRunning;if(STATE.timerRunning)startTimerInterval();else clearInterval(STATE.timerInterval);render()">${STATE.timerRunning?'⏸ Pause':'▶ Start'}</button>
        <button class="btn btn-ghost btn-sm" onclick="STATE.pomPhase='work';STATE.pomLeft=STATE.pomPreset.work;STATE.pomRound=1;STATE.timerRunning=false;clearInterval(STATE.timerInterval);render()">↺ Reset Round</button>
      </div>
      <div class="info-box note" style="margin-top:18px"><strong>Pomodoro Technique</strong>Work intensely for ${Math.round(STATE.pomPreset.work/60)} minutes, then take a ${Math.round(STATE.pomPreset.rest/60)}-minute break. Backed by neuroscience research for improved retention.</div>
    </div>`}
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
      ${[{l:'Today',v:fmtDur(todayDone),c:'var(--green)'},{l:'All Time',v:fmtDur(totalDone),c:'var(--accent)'},{l:'Longest',v:fmtDur(longest),c:'var(--purple)'},{l:'Average',v:fmtDur(avg),c:'var(--yellow)'}].map(s=>`<div class="metric-card"><div class="metric-val" style="color:${s.c};font-size:16px;font-family:'Space Mono',monospace">${s.v}</div><div class="metric-lbl">${s.l}</div></div>`).join('')}
    </div>
  </div>
  <div>
    <div class="card">
      <div class="fb mb-14">
        <h3>📋 History</h3>
        ${STATE.sessionLog.length?`<button class="btn btn-ghost btn-sm" style="color:var(--red);font-size:11px" onclick="if(confirm('Clear history?')){STATE.sessionLog=[];saveSession();render();}">Clear</button>`:''}
      </div>
      ${STATE.sessionLog.length===0?`<div style="text-align:center;padding:24px 0;color:var(--text3);font-size:13px">No sessions yet. Start the timer!</div>`:
      `<div style="display:flex;flex-direction:column;gap:7px;max-height:460px;overflow-y:auto">
        ${STATE.sessionLog.map(s=>`<div style="display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--surface2);border-radius:8px;font-size:12px">
          <span style="font-size:17px">${s.duration>=1500?'🔥':s.duration>=600?'✅':'⏱'}</span>
          <div style="flex:1;min-width:0"><div style="font-weight:600;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.label}</div><div style="color:var(--text3);font-size:10px">${fmtDate(s.date)}</div></div>
          <div style="font-family:'Space Mono',monospace;font-size:12px;color:var(--accent);font-weight:700;flex-shrink:0">${fmtDur(s.duration)}</div>
        </div>`).join('')}
      </div>`}
    </div>
    <div class="info-box tip" style="margin-top:14px"><strong>💡 Study Tips</strong><ul style="padding-left:16px;margin-top:6px;line-height:2"><li>25-min focused beats 2-hour distracted</li><li>Label sessions by topic to spot patterns</li><li>Aim for ≥30 min ML practice daily</li><li>90+ min sessions need a break to consolidate memory</li></ul></div>
  </div>
</div>`;
}

, y_train)\ny_pred = pipe.predict(X_test)\ny_prob = pipe.predict_proba(X_test)[:,1]\nprint(classification_report(y_test, y_pred))\nprint("ROC-AUC", roc_auc_score(y_test, y_prob))`;

  {keys:['which model','model choose','random forest','gradient boosting','logistic'],title:'Model choice shortcut',answer:'Start with LogisticRegression for classification baseline, RandomForest for robust tabular performance, GradientBoosting for stronger tabular accuracy, and statsmodels OLS for statistical inference.',go:'comparison'},

function safeDiv(a,b){ return b ? a/b : 0; }
function setMetricInput(k,v){ STATE.metricInputs[k]=v; saveMetricInputs(); render(); }
function parseNumList(txt){ return String(txt||'').split(/[\n,]+/).map(x=>parseFloat(x.trim())).filter(x=>!Number.isNaN(x)); }
function renderMetricCalculator(){
  const m=STATE.metricInputs;
  const tp=+m.tp||0, tn=+m.tn||0, fp=+m.fp||0, fn=+m.fn||0;
  const total=tp+tn+fp+fn;
  const acc=safeDiv(tp+tn,total), prec=safeDiv(tp,tp+fp), rec=safeDiv(tp,tp+fn), spec=safeDiv(tn,tn+fp), f1=safeDiv(2*prec*rec,prec+rec), fpr=safeDiv(fp,fp+tn), fnr=safeDiv(fn,fn+tp);
  const actual=parseNumList(m.actual), pred=parseNumList(m.pred);
  const n=Math.min(actual.length,pred.length);
  let mae=0, mse=0, r2=0;
  if(n){
    const ys=actual.slice(0,n), ps=pred.slice(0,n);
    mae=ys.reduce((s,y,i)=>s+Math.abs(y-ps[i]),0)/n;
    mse=ys.reduce((s,y,i)=>s+Math.pow(y-ps[i],2),0)/n;
    const mean=ys.reduce((s,y)=>s+y,0)/n;
    const ssRes=ys.reduce((s,y,i)=>s+Math.pow(y-ps[i],2),0);
    const ssTot=ys.reduce((s,y)=>s+Math.pow(y-mean,2),0);
    r2=ssTot?safeDiv(1-(ssRes/ssTot),1):0;
  }
  const pct=x=>(x*100).toFixed(2)+'%';
  return `
<div class="page-header"><div class="tag">Metric Calculator</div><h1>Manual ML Metric Calculator</h1><p>Calculate classification and regression metrics locally. This helps learners understand what sklearn metric functions are doing behind the scenes.</p><span class="local-badge">Free · Local · Teaching tool</span></div>
<div class="grid2">
  <div class="card">
    <h2 style="margin-bottom:8px">Classification Metrics</h2>
    <p style="color:var(--text2);font-size:13px;margin-bottom:14px">Enter confusion-matrix counts. The platform calculates the same ideas behind <code>accuracy_score</code>, <code>precision_score</code>, <code>recall_score</code> and <code>f1_score</code>.</p>
    <div class="grid2">
      ${[['tp','True Positives (TP)'],['tn','True Negatives (TN)'],['fp','False Positives (FP)'],['fn','False Negatives (FN)']].map(([k,l])=>`<div class="form-group"><label>${l}</label><input type="number" value="${m[k]}" onchange="setMetricInput('${k}',this.value)" min="0"/></div>`).join('')}
    </div>
    <div class="divider"></div>
    <div class="grid2">
      ${[
        ['Accuracy',pct(acc),'(TP+TN)/(All)','var(--accent)'],['Precision',pct(prec),'TP/(TP+FP)','var(--purple)'],['Recall',pct(rec),'TP/(TP+FN)','var(--green)'],['Specificity',pct(spec),'TN/(TN+FP)','var(--yellow)'],['F1 Score',pct(f1),'2PR/(P+R)','var(--accent3)'],['False Positive Rate',pct(fpr),'FP/(FP+TN)','var(--red)'],['False Negative Rate',pct(fnr),'FN/(FN+TP)','var(--red)'],['Total Samples',total,'TP+TN+FP+FN','var(--text)']
      ].map(x=>`<div class="metric-card"><div class="metric-val" style="font-size:20px;color:${x[3]}">${x[1]}</div><div class="metric-lbl">${x[0]}</div><div style="font-size:10px;color:var(--text3);margin-top:5px;font-family:'Space Mono',monospace">${x[2]}</div></div>`).join('')}
    </div>
    <div class="info-box note"><strong>Expert interpretation</strong>Use Recall when missing positives is costly. Use Precision when false alarms are costly. Use F1 when classes are imbalanced and both matter.</div>
  </div>
  <div class="card">
    <h2 style="margin-bottom:8px">Regression Metrics</h2>
    <p style="color:var(--text2);font-size:13px;margin-bottom:14px">Enter actual and predicted values separated by commas or new lines. The calculator returns MAE, MSE, RMSE and R².</p>
    <div class="form-group"><label>Actual values</label><textarea rows="4" onchange="setMetricInput('actual',this.value)">${m.actual||''}</textarea></div>
    <div class="form-group"><label>Predicted values</label><textarea rows="4" onchange="setMetricInput('pred',this.value)">${m.pred||''}</textarea></div>
    <div class="grid2">
      ${[
        ['Pairs Used',n,'Aligned actual/predicted values','var(--accent)'],['MAE',mae.toFixed(4),'Average absolute error','var(--green)'],['MSE',mse.toFixed(4),'Average squared error','var(--yellow)'],['RMSE',Math.sqrt(mse).toFixed(4),'Square root of MSE','var(--purple)'],['R²',r2.toFixed(4),'Variance explained','var(--accent3)']
      ].map(x=>`<div class="metric-card"><div class="metric-val" style="font-size:20px;color:${x[3]}">${x[1]}</div><div class="metric-lbl">${x[0]}</div><div style="font-size:10px;color:var(--text3);margin-top:5px">${x[2]}</div></div>`).join('')}

}

function csvEscape(s){ return String(s??'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function parseCSVLine(line){
  const out=[]; let cur='', q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"' && line[i+1]==='"'){cur+='"'; i++; continue;}
    if(ch==='"'){q=!q; continue;}
    if(ch===',' && !q){out.push(cur.trim()); cur=''; continue;}
    cur+=ch;
  }
  out.push(cur.trim()); return out;
}
function inspectCSVText(text){
  const lines=String(text||'').split(/\r?\n/).filter(x=>x.trim().length>0);
  if(lines.length<2) throw new Error('CSV needs one header row and at least one data row.');
  const headers=parseCSVLine(lines[0]).map((h,i)=>h||('column_'+(i+1)));
  const rows=lines.slice(1).map(parseCSVLine).map(r=>headers.map((_,i)=>r[i]??''));
  const cols=headers.map((h,ci)=>{
    const vals=rows.map(r=>r[ci]??'');
    const missing=vals.filter(v=>String(v).trim()==='').length;
    const non=vals.filter(v=>String(v).trim()!=='');
    const nums=non.map(v=>Number(v)).filter(v=>!Number.isNaN(v));
    const numeric=non.length>0 && nums.length===non.length;
    const distinct=new Set(non).size;
    const sorted=numeric?[...nums].sort((a,b)=>a-b):[];
    const mean=numeric?nums.reduce((s,v)=>s+v,0)/nums.length:null;
    return {name:h,missing,missingPct:rows.length?safeDiv(missing,rows.length):0,nonMissing:non.length,distinct,type:numeric?'numeric':'categorical/text',min:numeric?sorted[0]:null,max:numeric?sorted[sorted.length-1]:null,mean:numeric?mean:null,examples:[...new Set(non)].slice(0,3)};
  });
  return {rows:rows.length,columns:headers.length,headers,cols,preview:rows.slice(0,5)};
}
function inspectCSV(){
  try{ STATE.csvText=document.getElementById('csvText')?.value||STATE.csvText; STATE.csvProfile=inspectCSVText(STATE.csvText); STATE.csvError=''; }
  catch(e){ STATE.csvProfile=null; STATE.csvError=e.message; }
  render();
}
function loadCSVFile(input){
  const f=input.files && input.files[0]; if(!f) return;
  const reader=new FileReader();
  reader.onload=e=>{STATE.csvText=e.target.result; try{STATE.csvProfile=inspectCSVText(STATE.csvText);STATE.csvError='';}catch(err){STATE.csvError=err.message;STATE.csvProfile=null;} render();};
  reader.readAsText(f);
}

</div>
${STATE.csvError?`<div class="info-box error"><strong>CSV Error</strong>${STATE.csvError}</div>`:''}
${p?`<div class="grid3 mb16">${[['Rows',p.rows,'var(--accent)'],['Columns',p.columns,'var(--green)'],['Missing Cells',p.cols.reduce((s,c)=>s+c.missing,0),'var(--yellow)']].map(x=>`<div class="metric-card"><div class="metric-val" style="color:${x[2]}">${x[1]}</div><div class="metric-lbl">${x[0]}</div></div>`).join('')}</div>

function addTicket(){

  if(!t.title){showToast('Ticket title is required','error');return;}
  STATE.issueTickets=[t,...STATE.issueTickets]; saveIssueTickets(); logEvent('Issue ticket created',t.id+' · '+t.title); render();
}
function updateTicket(id,k,v){const t=STATE.issueTickets.find(x=>x.id===id); if(t){t[k]=v; saveIssueTickets(); logEvent('Issue ticket updated',id+' '+k); render();}}

function exportTicketsCSV(){
  const rows=[['ID','Title','Type','Priority','Status','Owner','Note','Created'],...STATE.issueTickets.map(t=>[t.id,t.title,t.type,t.priority,t.status,t.owner,t.note,new Date(t.createdAt).toLocaleString()])];
  const csv=rows.map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\n');
  downloadTextFile('ml_lab_issue_tickets.csv',csv,'text/csv'); logEvent('Issue tickets exported',STATE.issueTickets.length+' tickets');
}
