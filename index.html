params:[{n:'n_estimators=100',d:'Number of trees. More = stable predictions. 100–500 is standard. n_jobs=-1 trains in parallel.'},{n:'max_depth=None',d:'None = grow until pure leaves (may overfit). Set max_depth=5–10 to regularise.'},{n:'feature_importances_',d:'Post-training attribute. Mean impurity decrease per feature across all trees. Values sum to 1.'}],
watchout:'Random Forest does NOT need feature scaling. Also handles missing values poorly — always impute before fitting.'},
quiz:{q:'What does feature_importances_ measure in a Random Forest?',opts:['Correlation between each feature and the target','Mean decrease in impurity when each feature is used for splitting','Percentage of rows each feature is used in','The SHAP value of each feature'],ans:1}},

{id:'L08',section:'Evaluation',title:'Classification Metrics',difficulty:'Intermediate',duration:'12 min',
description:'Accuracy alone lies. Learn Precision, Recall, F1, ROC-AUC and when to use each.',
concepts:['accuracy_score','f1_score','roc_auc_score','classification_report','confusion_matrix'],
code:`<span class="kw">from</span> <span class="cls">sklearn.metrics</span> <span class="kw">import</span> (
    <span class="fn">accuracy_score</span>, <span class="fn">precision_score</span>, <span class="fn">recall_score</span>,
    <span class="fn">f1_score</span>, <span class="fn">roc_auc_score</span>, <span class="fn">classification_report</span>
)

<span class="var">acc</span>  <span class="op">=</span> <span class="fn">accuracy_score</span>(<span class="var">y_test</span>, <span class="var">y_pred</span>)
<span class="var">prec</span> <span class="op">=</span> <span class="fn">precision_score</span>(<span class="var">y_test</span>, <span class="var">y_pred</span>)
<span class="var">rec</span>  <span class="op">=</span> <span class="fn">recall_score</span>(<span class="var">y_test</span>, <span class="var">y_pred</span>)
<span class="var">f1</span>   <span class="op">=</span> <span class="fn">f1_score</span>(<span class="var">y_test</span>, <span class="var">y_pred</span>)
<span class="var">auc</span>  <span class="op">=</span> <span class="fn">roc_auc_score</span>(<span class="var">y_test</span>, <span class="var">y_prob</span>) <span class="cm"># needs y_prob not y_pred!</span>

<span class="fn">print</span>(<span class="fn">classification_report</span>(<span class="var">y_test</span>, <span class="var">y_pred</span>,
      <span class="param">target_names</span><span class="op">=</span>[<span class="str">'Stay'</span>, <span class="str">'Churn'</span>]))`,
output:`Accuracy:  0.8050   Precision: 0.6091
Recall:    0.4850   F1 Score:  0.5397
ROC-AUC:   0.8680

              precision  recall  f1-score
       Stay       0.85    0.91      0.88
      Churn       0.61    0.49      0.54`,
explanation:{why:'With imbalanced classes a model predicting "stay" every time gets 80% accuracy but catches zero churners. Precision, Recall, F1, and AUC expose this deception.',
params:[{n:'Precision = TP/(TP+FP)',d:'Of predicted positives, what fraction actually are? High precision = fewer false alarms.'},{n:'Recall = TP/(TP+FN)',d:'Of actual positives, what fraction did we catch? High recall = fewer missed churners.'},{n:'F1 = 2×(P×R)/(P+R)',d:'Harmonic mean of Precision and Recall. Best single metric for imbalanced data.'},{n:'ROC-AUC',d:'Requires y_prob (probabilities), not y_pred (labels). Threshold-independent. 0.5=random, 1.0=perfect.'}],
watchout:'Use y_prob for roc_auc_score, not y_pred. Using labels gives a meaningless AUC score.'},
quiz:{q:'Your model has 95% accuracy but only 10% recall on churners. What does this mean?',opts:['The model is excellent','The model misses 90% of actual churners — nearly useless for churn detection','The model has too many false positives','Precision and Recall are always equal'],ans:1}},

{id:'L09',section:'Model Selection',title:'Cross-Validation',difficulty:'Intermediate',duration:'10 min',
description:'Get a reliable, unbiased estimate of model performance using k-fold CV.',
concepts:['cross_val_score','StratifiedKFold','KFold','cv'],
code:`<span class="kw">from</span> <span class="cls">sklearn.model_selection</span> <span class="kw">import</span> <span class="fn">cross_val_score</span>, <span class="cls">StratifiedKFold</span>

<span class="var">skf</span> <span class="op">=</span> <span class="cls">StratifiedKFold</span>(<span class="param">n_splits</span><span class="op">=</span><span class="num">5</span>, <span class="param">shuffle</span><span class="op">=</span><span class="kw">True</span>, <span class="param">random_state</span><span class="op">=</span><span class="num">42</span>)

<span class="var">cv_f1</span> <span class="op">=</span> <span class="fn">cross_val_score</span>(
    <span class="var">rf</span>, <span class="var">X_train</span>, <span class="var">y_train</span>,
    <span class="param">cv</span><span class="op">=</span><span class="var">skf</span>,
    <span class="param">scoring</span><span class="op">=</span><span class="str">'f1'</span>,
    <span class="param">n_jobs</span><span class="op">=</span><span class="op">-</span><span class="num">1</span>
)
<span class="fn">print</span>(<span class="str">f"CV F1 per fold: {cv_f1.round(3)}"</span>)
<span class="fn">print</span>(<span class="str">f"Mean F1: {cv_f1.mean():.4f} ± {cv_f1.std():.4f}"</span>)

<span class="var">cv_auc</span> <span class="op">=</span> <span class="fn">cross_val_score</span>(
    <span class="var">rf</span>, <span class="var">X_train</span>, <span class="var">y_train</span>,
    <span class="param">cv</span><span class="op">=</span><span class="var">skf</span>, <span class="param">scoring</span><span class="op">=</span><span class="str">'roc_auc'</span>
)
<span class="fn">print</span>(<span class="str">f"Mean AUC: {cv_auc.mean():.4f} ± {cv_auc.std():.4f}"</span>)`,
output:`CV F1 per fold: [0.512 0.489 0.541 0.498 0.523]
Mean F1: 0.5126 ± 0.0189
Mean AUC: 0.8612 ± 0.0124`,
explanation:{why:'A single train/test split gives one score that depends heavily on which rows ended up in the test set by chance. Cross-validation repeats this k times with different folds and averages — far more reliable.',
params:[{n:'n_splits=5',d:'5 folds — train on 4, test on 1, repeat 5 times. Standard choices: 5 or 10.'},{n:'StratifiedKFold',d:'Maintains class proportion in every fold. Always use for imbalanced classification.'},{n:'scoring="f1"',d:'Options: "f1", "roc_auc", "accuracy", "precision", "recall", "neg_mean_squared_error".'}],
watchout:'cross_val_score only uses X_train. Never include X_test in cross-validation — it is reserved for the final, once-only evaluation.'},
quiz:{q:'CV F1 scores: [0.45, 0.82, 0.43, 0.79, 0.44]. What does the high std suggest?',opts:['The model is excellent — high variance is good','The model is overfitting or the data has structural inconsistencies','You need to increase n_splits','F1 is the wrong metric'],ans:1}},

{id:'L10',section:'Model Selection',title:'GridSearchCV & RandomizedSearchCV',difficulty:'Intermediate',duration:'12 min',
description:'Systematically find the best hyperparameters using cross-validated search.',
concepts:['GridSearchCV','RandomizedSearchCV','param_grid','best_params_','best_estimator_'],
code:`<span class="kw">from</span> <span class="cls">sklearn.model_selection</span> <span class="kw">import</span> <span class="cls">GridSearchCV</span>

<span class="var">param_grid</span> <span class="op">=</span> {
    <span class="str">'n_estimators'</span>:     [<span class="num">50</span>, <span class="num">100</span>, <span class="num">200</span>],
    <span class="str">'max_depth'</span>:        [<span class="num">3</span>, <span class="num">5</span>, <span class="num">10</span>, <span class="kw">None</span>],
    <span class="str">'min_samples_leaf'</span>: [<span class="num">1</span>, <span class="num">2</span>, <span class="num">4</span>],
}
<span class="var">gs</span> <span class="op">=</span> <span class="cls">GridSearchCV</span>(
    <span class="cls">RandomForestClassifier</span>(<span class="param">random_state</span><span class="op">=</span><span class="num">42</span>),
    <span class="var">param_grid</span>,
    <span class="param">cv</span><span class="op">=</span><span class="num">5</span>, <span class="param">scoring</span><span class="op">=</span><span class="str">'f1'</span>, <span class="param">n_jobs</span><span class="op">=</span><span class="op">-</span><span class="num">1</span>, <span class="param">verbose</span><span class="op">=</span><span class="num">1</span>
)
<span class="var">gs</span><span class="op">.</span><span class="fn">fit</span>(<span class="var">X_train</span>, <span class="var">y_train</span>)

<span class="fn">print</span>(<span class="str">"Best params:"</span>, <span class="var">gs</span><span class="op">.</span><span class="var">best_params_</span>)
<span class="fn">print</span>(<span class="str">"Best CV F1: "</span>, <span class="var">gs</span><span class="op">.</span><span class="var">best_score_</span>)

<span class="var">best_model</span> <span class="op">=</span> <span class="var">gs</span><span class="op">.</span><span class="var">best_estimator_</span>
<span class="var">y_pred</span>     <span class="op">=</span> <span class="var">best_model</span><span class="op">.</span><span class="fn">predict</span>(<span class="var">X_test</span>)`,
output:`Best params: {'max_depth': 10, 'min_samples_leaf': 2, 'n_estimators': 200}
Best CV F1:  0.5680
Final Test F1: 0.5812`,
explanation:{why:'Hyperparameters cannot be learned from data — you set them before training. GridSearchCV tries every combination and uses cross-validation to evaluate each, finding the best without touching the test set.',
params:[{n:'param_grid',d:'Dictionary of param_name: [list of values]. GridSearchCV tries every combination (cartesian product).'},{n:'best_params_',d:'Post-fit. Dictionary of the winning hyperparameter combination.'},{n:'best_estimator_',d:'The actual fitted model with best params, retrained on full training set. Use this to predict.'}],
watchout:'GridSearchCV is exhaustive and slow. For large spaces, use RandomizedSearchCV with n_iter=50 — usually 90% as good in 10% of the time.'},
quiz:{q:'How do you get the winning fitted model after GridSearchCV?',opts:['gs.predict(X_test)','gs.best_estimator_.predict(X_test)','gs.best_model_.predict(X_test)','gs.fit(X_test)'],ans:1}},

{id:'L11',section:'Regression',title:'Linear Regression (statsmodels)',difficulty:'Intermediate',duration:'12 min',
description:'Use statsmodels OLS for statistical inference — p-values, R², confidence intervals.',
concepts:['OLS','sm.add_constant','summary()','pvalues','rsquared'],
code:`<span class="kw">import</span> <span class="cls">statsmodels.api</span> <span class="kw">as</span> <span class="var">sm</span>

<span class="cm"># ── CRITICAL: always add constant for intercept ──────────────────</span>
<span class="var">X_const</span> <span class="op">=</span> <span class="var">sm</span><span class="op">.</span><span class="fn">add_constant</span>(<span class="var">X_train</span>)

<span class="cm"># ── Note: y FIRST, then X — opposite of sklearn ──────────────────</span>
<span class="var">result</span> <span class="op">=</span> <span class="var">sm</span><span class="op">.</span><span class="cls">OLS</span>(<span class="var">y_train</span>, <span class="var">X_const</span>)<span class="op">.</span><span class="fn">fit</span>()
<span class="fn">print</span>(<span class="var">result</span><span class="op">.</span><span class="fn">summary</span>())

<span class="fn">print</span>(<span class="str">"R²:      "</span>, <span class="var">result</span><span class="op">.</span><span class="var">rsquared</span><span class="op">.</span><span class="fn">round</span>(<span class="num">4</span>))
<span class="fn">print</span>(<span class="str">"p-values:\n"</span>, <span class="var">result</span><span class="op">.</span><span class="var">pvalues</span><span class="op">.</span><span class="fn">round</span>(<span class="num">4</span>))

<span class="cm"># ── Predict (also needs add_constant) ───────────────────────────</span>
<span class="var">X_test_c</span> <span class="op">=</span> <span class="var">sm</span><span class="op">.</span><span class="fn">add_constant</span>(<span class="var">X_test</span>)
<span class="var">y_pred</span>   <span class="op">=</span> <span class="var">result</span><span class="op">.</span><span class="fn">predict</span>(<span class="var">X_test_c</span>)`,
output:`R-squared:   0.7420   Adj. R²: 0.7382
p-values:
  const     0.0001
  age       0.0000  ← significant
  bmi       0.0000  ← significant
  smoker    0.0000  ← significant
  children  0.4200  ← NOT significant (p>0.05)`,
explanation:{why:'Statsmodels OLS gives the full statistical picture — p-values, confidence intervals, AIC. Sklearn LinearRegression only gives you coefficients and predictions.',
params:[{n:'sm.add_constant(X)',d:'Adds a column of 1s for the intercept. statsmodels does NOT add intercept automatically — skipping this gives wrong results.'},{n:'result.summary()',d:'Full regression table: coefficients, p-values, t-stats, CIs, R², AIC, F-statistic.'},{n:'result.pvalues',d:'p < 0.05 = statistically significant. p > 0.05 = consider dropping the feature.'}],
watchout:'statsmodels requires sm.add_constant(X). Forgetting this is the most common error. Also: OLS(y, X) — y first, X second (opposite to sklearn).'},
quiz:{q:'A feature has p-value = 0.42 in statsmodels OLS. What does this suggest?',opts:['The feature is highly significant','The feature may not contribute meaningfully — consider dropping it','The model is overfitting','R² will improve by adding more features'],ans:1}},

{id:'L12',section:'Regression',title:'Regression Metrics',difficulty:'Beginner',duration:'8 min',
description:'MAE, MSE, RMSE, R² — understand what each tells you about your regression model.',
concepts:['mean_absolute_error','mean_squared_error','r2_score','RMSE'],
code:`<span class="kw">from</span> <span class="cls">sklearn.metrics</span> <span class="kw">import</span> (
    <span class="fn">mean_absolute_error</span>, <span class="fn">mean_squared_error</span>, <span class="fn">r2_score</span>
)
<span class="kw">import</span> <span class="cls">numpy</span> <span class="kw">as</span> <span class="var">np</span>

<span class="var">mae</span>  <span class="op">=</span> <span class="fn">mean_absolute_error</span>(<span class="var">y_test</span>, <span class="var">y_pred</span>)
<span class="var">mse</span>  <span class="op">=</span> <span class="fn">mean_squared_error</span>(<span class="var">y_test</span>, <span class="var">y_pred</span>)
<span class="var">rmse</span> <span class="op">=</span> <span class="var">np</span><span class="op">.</span><span class="fn">sqrt</span>(<span class="var">mse</span>)
<span class="var">r2</span>   <span class="op">=</span> <span class="fn">r2_score</span>(<span class="var">y_test</span>, <span class="var">y_pred</span>)

<span class="fn">print</span>(<span class="str">f"MAE:  ₦{mae:,.0f}"</span>)
<span class="fn">print</span>(<span class="str">f"RMSE: ₦{rmse:,.0f}"</span>)
<span class="fn">print</span>(<span class="str">f"R²:   {r2:.4f}"</span>)

<span class="kw">if</span> <span class="var">r2</span> <span class="op">>=</span> <span class="num">0.7</span>:
    <span class="fn">print</span>(<span class="str">"✓ Good fit — model explains ≥70% of variance"</span>)
<span class="kw">elif</span> <span class="var">r2</span> <span class="op"><</span> <span class="num">0</span>:
    <span class="fn">print</span>(<span class="str">"✗ R²<0 — model is WORSE than predicting the mean!"</span>)`,
output:`MAE:  ₦1,842
RMSE: ₦2,864
R²:   0.8550
✓ Good fit — model explains ≥70% of variance`,
explanation:{why:'Regression models predict continuous values. The distance between predictions and actuals tells you model quality.',
params:[{n:'MAE',d:'Mean Absolute Error. Average of |predicted - actual|. Interpretable in original units. Less sensitive to outliers.'},{n:'RMSE',d:'Root Mean Squared Error. Back in original units. Penalises large errors more than MAE. Most commonly reported.'},{n:'R²',d:'Proportion of variance explained. 0 = as good as predicting mean. 1 = perfect. Negative = WORSE than mean.'}],
watchout:'R²≈0 does not always mean the model is broken — it may mean your features genuinely cannot predict the target. Diagnose by checking target variance.'},
quiz:{q:'Your regression model has R² = -0.05. What does this mean?',opts:['The model explains 5% of variance','The model is slightly better than guessing','The model performs WORSE than predicting the mean — something is seriously wrong','Negative R² only appears in statsmodels'],ans:2}},

{id:'L13',section:'Advanced',title:'Saving & Loading Models (joblib)',difficulty:'Beginner',duration:'5 min',
description:'Persist your trained model to disk and reload it for deployment.',
concepts:['joblib.dump','joblib.load'],
code:`<span class="kw">import</span> <span class="cls">joblib</span>
<span class="kw">import</span> <span class="cls">os</span>

<span class="var">os</span><span class="op">.</span><span class="fn">makedirs</span>(<span class="str">'models/'</span>, <span class="param">exist_ok</span><span class="op">=</span><span class="kw">True</span>)

<span class="cm"># ── Save the FULL pipeline (recommended) ─────────────────────────</span>
<span class="var">joblib</span><span class="op">.</span><span class="fn">dump</span>(<span class="var">full_pipeline</span>, <span class="str">'models/pipeline_v1.pkl'</span>)
<span class="fn">print</span>(<span class="str">"✓ Pipeline saved"</span>)

<span class="cm"># ── Load it back ─────────────────────────────────────────────────</span>
<span class="var">loaded</span> <span class="op">=</span> <span class="var">joblib</span><span class="op">.</span><span class="fn">load</span>(<span class="str">'models/pipeline_v1.pkl'</span>)

<span class="cm"># ── Predict on raw new data — pipeline handles preprocessing ─────</span>
<span class="var">new_data</span> <span class="op">=</span> <span class="var">pd</span><span class="op">.</span><span class="cls">DataFrame</span>({
    <span class="str">'age'</span>: [<span class="num">35</span>], <span class="str">'geography'</span>: [<span class="str">'France'</span>], <span class="str">'balance'</span>: [<span class="num">82000</span>]
})
<span class="var">pred</span> <span class="op">=</span> <span class="var">loaded</span><span class="op">.</span><span class="fn">predict</span>(<span class="var">new_data</span>)
<span class="var">prob</span> <span class="op">=</span> <span class="var">loaded</span><span class="op">.</span><span class="fn">predict_proba</span>(<span class="var">new_data</span>)[:, <span class="num">1</span>]
<span class="fn">print</span>(<span class="str">f"Prediction: {pred[0]} | Churn P: {prob[0]:.2%}"</span>)`,
output:`✓ Pipeline saved to models/pipeline_v1.pkl
Prediction: 0 | Churn P: 14.32%`,
explanation:{why:'Training takes time. Once trained, save the model to disk so your Streamlit app, API, or notebook can load it instantly without retraining. Saving the full Pipeline means preprocessing is handled automatically.',
params:[{n:'joblib.dump(obj, path)',d:'Serialises any Python object to .pkl file. Faster than pickle for sklearn models with large numpy arrays.'},{n:'joblib.load(path)',d:'Restores the object with all fitted attributes intact. Call .predict() directly.'},{n:'Save Pipeline, not just model',d:'If you save only the model, you must manually preprocess new data every time. Save the full Pipeline.'}],
watchout:'Models are version-sensitive. A model trained with sklearn 1.2 may fail to load in sklearn 1.5. Always record library versions in requirements.txt.'},
quiz:{q:'Why is it better to save the full Pipeline rather than just the model?',opts:['Pipeline files are smaller','The Pipeline automatically preprocesses new raw data — no manual steps needed','The model file is read-only','joblib.dump cannot save individual models'],ans:1}},,
{"id": "L14", "section": "Data Understanding", "title": "Problem Framing & Target Definition", "difficulty": "Beginner", "duration": "10 min", "description": "Translate a real-world problem into a clear ML task, target variable, row definition and success metric.", "concepts": ["problem framing", "target", "unit of prediction", "success metric"], "code": "# Step 1: write the prediction question in plain English\nproblem = &quot;Predict whether a student is at risk before final exams&quot;\n\n# Step 2: define one row and one target\nunit_of_prediction = &quot;one student in one term&quot;\ntarget_column = &quot;at_risk&quot;   # 1 = likely to fail, 0 = likely to pass\n\n# Step 3: choose the task type and metric before modelling\ntask_type = &quot;binary classification&quot;\nprimary_metric = &quot;recall&quot;   # missing an at-risk student is costly\nsecondary_metric = &quot;f1", "output": "Problem: Predict whether a student is at risk before final exams\nTask: binary classification\nPrimary metric: recall", "explanation": {"why": "Most beginner ML projects fail before modelling because the target is unclear. Clear problem framing prevents wrong labels, wrong metrics and misleading results.", "params": [{"n": "unit_of_prediction", "d": "Defines what one row means. A row could be one student, one transaction, one claim or one article."}, {"n": "target_column", "d": "The exact column the model learns to predict. It must be available historically but not leaked from the future."}, {"n": "primary_metric", "d": "The metric chosen before training. It should match the real-world cost of mistakes."}], "watchout": "Never start modelling until you can explain the target and the cost of false positives/false negatives in one paragraph."}, "quiz": {"q": "What should be defined before training any model?", "opts": ["The colour theme", "The target, row meaning and success metric", "The final GitHub URL", "The laptop brand"], "ans": 1}},
{"id": "L15", "section": "Data Understanding", "title": "EDA for Model Readiness", "difficulty": "Beginner", "duration": "14 min", "description": "Perform EDA specifically for modelling: target balance, missing values, leakage candidates and feature types.", "concepts": ["EDA", "target balance", "missing values", "leakage audit"], "code": "import pandas as pd\n\nprint(df.shape)\nprint(df.dtypes)\nprint(df.isna().mean().sort_values(ascending=False).head(10))\n\n# Target balance\ntarget = &quot;at_risk&quot;\nprint(df[target].value_counts(normalize=True))\n\n# Quick leakage audit: columns suspiciously created after the outcome\nsuspicious = [c for c in df.columns if &quot;final&quot; in c.lower() or &quot;result&quot; in c.lower()]\nprint(&quot;Possible leakage columns:&quot;, suspicious)", "output": "Rows/columns printed\nMissing-value rate listed\nTarget distribution displayed\nPossible leakage columns flagged", "explanation": {"why": "EDA for modelling is not just charts. It is a risk audit: can the data support the prediction task without leakage, severe missingness or target imbalance surprises?", "params": [{"n": "df.isna().mean()", "d": "Shows missing-value percentage per column."}, {"n": "value_counts(normalize=True)", "d": "Shows class balance as proportions."}, {"n": "leakage audit", "d": "Searches for columns that may reveal the answer after the event."}], "watchout": "Beautiful charts do not guarantee a valid model. Always check leakage and target distribution before feature engineering."}, "quiz": {"q": "Which EDA check is essential before classification modelling?", "opts": ["Target distribution", "Only font size", "Only row order", "Only file name"], "ans": 0}},
{"id": "L16", "section": "Preprocessing", "title": "Missing Values & Imputation Strategy", "difficulty": "Beginner", "duration": "12 min", "description": "Choose imputation strategies for numeric and categorical columns inside a leakage-safe pipeline.", "concepts": ["SimpleImputer", "median", "most_frequent", "missing indicator"], "code": "from sklearn.impute import SimpleImputer\nfrom sklearn.pipeline import Pipeline\nfrom sklearn.preprocessing import OneHotEncoder, StandardScaler\n\nnum_pipe = Pipeline([\n    (&quot;imputer&quot;, SimpleImputer(strategy=&quot;median&quot;)),\n    (&quot;scaler&quot;, StandardScaler())\n])\n\ncat_pipe = Pipeline([\n    (&quot;imputer&quot;, SimpleImputer(strategy=&quot;most_frequent&quot;)),\n    (&quot;encoder&quot;, OneHotEncoder(handle_unknown=&quot;ignore&quot;))\n])", "output": "Numeric pipeline: median imputation + scaling\nCategorical pipeline: most frequent imputation + one-hot encoding", "explanation": {"why": "Missing values must be handled inside the training pipeline so that imputation values are learned from training data only and applied consistently to test and production data.", "params": [{"n": "median", "d": "Robust numeric imputation, less affected by outliers than mean."}, {"n": "most_frequent", "d": "Common categorical imputation for missing labels."}, {"n": "handle_unknown=\"ignore\"", "d": "Prevents deployment failure when a new category appears."}], "watchout": "Never fill missing values using statistics calculated from the full dataset before the train/test split."}, "quiz": {"q": "Where should imputation happen in a professional workflow?", "opts": ["Inside a Pipeline fitted on training data", "Manually on the whole dataset before splitting", "Only on the test set", "After model prediction"], "ans": 0}},
{"id": "L17", "section": "Preprocessing", "title": "Outliers, Skewness & Robust Preprocessing", "difficulty": "Intermediate", "duration": "14 min", "description": "Detect outliers and choose robust transformations without destroying useful signal.", "concepts": ["outliers", "IQR", "RobustScaler", "log1p"], "code": "import numpy as np\n\ncol = &quot;income&quot;\nq1, q3 = df[col].quantile([0.25, 0.75])\niqr = q3 - q1\nlower, upper = q1 - 1.5*iqr, q3 + 1.5*iqr\noutlier_rate = ((df[col] &lt; lower) | (df[col] &gt; upper)).mean()\nprint(f&quot;Outlier rate: {outlier_rate:.2%}&quot;)\n\n# For heavily skewed positive columns\nX_train[&quot;income_log&quot;] = np.log1p(X_train[&quot;income&quot;])\nX_test[&quot;income_log&quot;]  = np.log1p(X_test[&quot;income&quot;])\n", "output": "Outlier rate: 4.80%\nincome_log created for train and test", "explanation": {"why": "Outliers are not automatically bad. In income, claims or transaction data, extreme values may carry important signal. The goal is to reduce distortion, not blindly delete data.", "params": [{"n": "IQR rule", "d": "A simple outlier detection rule using quartiles."}, {"n": "np.log1p", "d": "Compresses positive skew while handling zero values."}, {"n": "RobustScaler", "d": "Uses median and IQR, making it less sensitive to extreme values."}], "watchout": "Do not remove outliers just because they are extreme. First ask whether they are valid observations or data errors."}, "quiz": {"q": "Which transformer is most resistant to outliers?", "opts": ["MinMaxScaler", "RobustScaler", "LabelEncoder", "train_test_split"], "ans": 1}},
{"id": "L18", "section": "Model Training", "title": "Baseline Models & Sanity Checks", "difficulty": "Beginner", "duration": "11 min", "description": "Build simple baselines so you know whether your advanced model is actually useful.", "concepts": ["DummyClassifier", "baseline", "sanity check", "majority class"], "code": "from sklearn.dummy import DummyClassifier\nfrom sklearn.metrics import classification_report\n\nbaseline = DummyClassifier(strategy=&quot;most_frequent&quot;)\nbaseline.fit(X_train, y_train)\ny_base = baseline.predict(X_test)\n\nprint(classification_report(y_test, y_base))\n", "output": "Baseline predicts the majority class\nRecall for minority class may be 0.00\nAdvanced models must beat this honestly", "explanation": {"why": "A baseline is the minimum model performance you must beat. It exposes fake success, especially on imbalanced data where accuracy can look high even when the model learns nothing useful.", "params": [{"n": "DummyClassifier", "d": "A simple baseline model for classification."}, {"n": "most_frequent", "d": "Always predicts the majority class."}, {"n": "classification_report", "d": "Shows whether minority class recall is zero."}], "watchout": "If your advanced model only barely beats a dummy baseline, revisit features, labels and problem framing."}, "quiz": {"q": "What is the purpose of a baseline model?", "opts": ["To replace all advanced models", "To provide a minimum comparison point", "To make deployment automatic", "To remove missing values"], "ans": 1}},
{"id": "L19", "section": "Model Training", "title": "Decision Trees Explained", "difficulty": "Intermediate", "duration": "13 min", "description": "Understand decision trees, overfitting, max_depth and why tree rules are easy to explain.", "concepts": ["DecisionTreeClassifier", "max_depth", "gini", "overfitting"], "code": "from sklearn.tree import DecisionTreeClassifier\nfrom sklearn.metrics import classification_report\n\ntree = DecisionTreeClassifier(max_depth=4, min_samples_leaf=20, random_state=42)\ntree.fit(X_train, y_train)\ny_pred = tree.predict(X_test)\nprint(classification_report(y_test, y_pred))\nprint(&quot;Tree depth:&quot;, tree.get_depth())\n", "output": "Tree depth: 4\nClassification report printed", "explanation": {"why": "Decision trees split data using if/else rules. They are interpretable but can overfit quickly if allowed to grow too deep.", "params": [{"n": "max_depth", "d": "Limits how many levels the tree can grow."}, {"n": "min_samples_leaf", "d": "Prevents tiny, unreliable leaf nodes."}, {"n": "gini", "d": "Default impurity measure used to choose splits."}], "watchout": "A fully grown tree can memorize training data. Regularise with max_depth and min_samples_leaf."}, "quiz": {"q": "Which parameter directly limits tree complexity?", "opts": ["max_depth", "random_state", "test_size", "target_names"], "ans": 0}},
{"id": "L20", "section": "Model Training", "title": "KNN and SVM: Distance-Based Models", "difficulty": "Intermediate", "duration": "15 min", "description": "Learn when distance-based models are useful and why scaling is non-negotiable.", "concepts": ["KNeighborsClassifier", "SVC", "StandardScaler", "distance"], "code": "from sklearn.pipeline import Pipeline\nfrom sklearn.preprocessing import StandardScaler\nfrom sklearn.neighbors import KNeighborsClassifier\nfrom sklearn.svm import SVC\n\nknn_pipe = Pipeline([\n    (&quot;scaler&quot;, StandardScaler()),\n    (&quot;model&quot;, KNeighborsClassifier(n_neighbors=5))\n])\n\nsvc_pipe = Pipeline([\n    (&quot;scaler&quot;, StandardScaler()),\n    (&quot;model&quot;, SVC(kernel=&quot;rbf&quot;, C=1.0, probability=True))\n])", "output": "Two scaled model pipelines created: KNN and SVC", "explanation": {"why": "KNN and SVM depend on distances or margins. Unscaled features allow large-valued columns to dominate the model unfairly.", "params": [{"n": "StandardScaler", "d": "Required for distance-based models."}, {"n": "n_neighbors", "d": "Number of nearby points KNN uses to vote."}, {"n": "C", "d": "SVM penalty for misclassification."}], "watchout": "KNN can be slow at prediction time on large datasets because it compares new rows to many training rows."}, "quiz": {"q": "Why must KNN and SVM usually be scaled?", "opts": ["They require string columns", "They depend on distance or margin calculations", "They cannot use train_test_split", "They only work with images"], "ans": 1}},
{"id": "L21", "section": "Model Training", "title": "Gradient Boosting for Tabular Data", "difficulty": "Intermediate", "duration": "16 min", "description": "Train and tune Gradient Boosting, one of the strongest classical ML methods for tabular data.", "concepts": ["GradientBoostingClassifier", "learning_rate", "n_estimators", "max_depth"], "code": "from sklearn.ensemble import GradientBoostingClassifier\n\nmodel = GradientBoostingClassifier(\n    n_estimators=200,\n    learning_rate=0.05,\n    max_depth=3,\n    random_state=42\n)\nmodel.fit(X_train, y_train)\ny_pred = model.predict(X_test)\ny_prob = model.predict_proba(X_test)[:, 1]\n", "output": "GradientBoostingClassifier trained\ny_pred and y_prob generated", "explanation": {"why": "Boosting builds trees sequentially. Each new tree tries to correct errors made by earlier trees. This often gives strong accuracy on structured/tabular data.", "params": [{"n": "n_estimators", "d": "Number of boosting stages."}, {"n": "learning_rate", "d": "How strongly each tree contributes."}, {"n": "max_depth", "d": "Usually kept small, often 2 to 5, to avoid overfitting."}], "watchout": "High learning_rate with many trees can overfit. Lower learning_rate usually needs more trees."}, "quiz": {"q": "What does boosting do?", "opts": ["Builds trees sequentially to correct previous errors", "Sorts rows alphabetically", "Removes categorical columns", "Uses only one feature"], "ans": 0}},
{"id": "L22", "section": "Regression", "title": "Regularised Regression: Ridge, Lasso, ElasticNet", "difficulty": "Intermediate", "duration": "15 min", "description": "Use regularisation to control overfitting and handle correlated features in regression.", "concepts": ["Ridge", "Lasso", "ElasticNet", "alpha"], "code": "from sklearn.linear_model import Ridge, Lasso, ElasticNet\nfrom sklearn.pipeline import Pipeline\nfrom sklearn.preprocessing import StandardScaler\n\nridge = Pipeline([(&quot;scaler&quot;, StandardScaler()), (&quot;model&quot;, Ridge(alpha=1.0))])\nlasso = Pipeline([(&quot;scaler&quot;, StandardScaler()), (&quot;model&quot;, Lasso(alpha=0.1))])\nelastic = Pipeline([(&quot;scaler&quot;, StandardScaler()), (&quot;model&quot;, ElasticNet(alpha=0.1, l1_ratio=0.5))])\n", "output": "Ridge, Lasso and ElasticNet pipelines created", "explanation": {"why": "Regularisation discourages overly large coefficients. Ridge shrinks coefficients, Lasso can set some to zero, and ElasticNet blends both behaviours.", "params": [{"n": "alpha", "d": "Regularisation strength. Higher alpha means stronger penalty."}, {"n": "l1_ratio", "d": "ElasticNet balance between L1 and L2 penalties."}, {"n": "StandardScaler", "d": "Important because regularisation depends on coefficient size."}], "watchout": "Lasso may drop one of two strongly correlated features arbitrarily. Interpret selected features carefully."}, "quiz": {"q": "Which regularised model can set coefficients exactly to zero?", "opts": ["Ridge", "Lasso", "LinearRegression", "DummyRegressor"], "ans": 1}},
{"id": "L23", "section": "Interpretability", "title": "Feature Importance, Permutation Importance & SHAP", "difficulty": "Advanced", "duration": "18 min", "description": "Explain model behaviour responsibly using global and local interpretability methods.", "concepts": ["feature_importances_", "permutation_importance", "SHAP", "interpretability"], "code": "from sklearn.inspection import permutation_importance\nimport pandas as pd\n\nresult = permutation_importance(model, X_test, y_test, n_repeats=10, random_state=42)\nimp = pd.Series(result.importances_mean, index=X_test.columns).sort_values(ascending=False)\nprint(imp.head(10))\n", "output": "Top 10 permutation importances printed", "explanation": {"why": "Interpretability turns model output into evidence. It helps stakeholders understand which features influence predictions and whether the model is behaving sensibly.", "params": [{"n": "feature_importances_", "d": "Fast tree-based importance, but can be biased toward high-cardinality features."}, {"n": "permutation_importance", "d": "Measures performance drop when a feature is shuffled."}, {"n": "SHAP", "d": "Explains individual predictions and global patterns, useful but heavier."}], "watchout": "Feature importance is not causation. A feature can be predictive without being the true cause."}, "quiz": {"q": "What does permutation importance measure?", "opts": ["Performance drop after shuffling a feature", "Alphabetical order of columns", "Number of missing values", "The training file size"], "ans": 0}},
{"id": "L24", "section": "Evaluation", "title": "Threshold Tuning & Probability Calibration", "difficulty": "Advanced", "duration": "18 min", "description": "Move beyond the default 0.5 threshold and choose decision thresholds based on business cost.", "concepts": ["threshold tuning", "precision_recall_curve", "calibration", "decision cost"], "code": "from sklearn.metrics import precision_recall_curve\n\nprecision, recall, thresholds = precision_recall_curve(y_test, y_prob)\n\n# Example: choose the first threshold where recall is at least 80%\nfor p, r, t in zip(precision, recall, thresholds):\n    if r &gt;= 0.80:\n        chosen_threshold = t\n        break\n\ny_custom = (y_prob &gt;= chosen_threshold).astype(int)\nprint(&quot;Chosen threshold:&quot;, chosen_threshold)\n", "output": "Chosen threshold printed\nCustom predictions created from probabilities", "explanation": {"why": "The default threshold of 0.5 is not sacred. In high-stakes problems, you often adjust the threshold to catch more positives or reduce false alarms.", "params": [{"n": "precision_recall_curve", "d": "Shows trade-off between precision and recall across thresholds."}, {"n": "chosen_threshold", "d": "Decision cut-off selected based on real-world cost."}, {"n": "calibration", "d": "Checks whether predicted probabilities match observed frequencies."}], "watchout": "Improving recall by lowering threshold usually increases false positives. Always explain the trade-off."}, "quiz": {"q": "Why tune a classification threshold?", "opts": ["To align predictions with real-world cost", "To change column names", "To speed up import statements", "To remove the target"], "ans": 0}},
{"id": "L25", "section": "Evaluation", "title": "Multiclass Classification Metrics", "difficulty": "Intermediate", "duration": "14 min", "description": "Evaluate models with more than two classes using macro, micro and weighted averages.", "concepts": ["multiclass", "macro avg", "weighted avg", "confusion_matrix"], "code": "from sklearn.metrics import classification_report, confusion_matrix\n\nmodel.fit(X_train, y_train)\ny_pred = model.predict(X_test)\n\nprint(classification_report(y_test, y_pred))\nprint(confusion_matrix(y_test, y_pred))\n", "output": "Classification report shows precision/recall/F1 for every class\nConfusion matrix printed", "explanation": {"why": "Multiclass evaluation requires looking at every class, not only overall accuracy. Macro average treats all classes equally, while weighted average accounts for class support.", "params": [{"n": "macro avg", "d": "Average metric across classes equally."}, {"n": "weighted avg", "d": "Average weighted by number of samples per class."}, {"n": "confusion_matrix", "d": "Shows which classes are being confused with each other."}], "watchout": "High overall accuracy can hide poor performance on a rare class."}, "quiz": {"q": "Which average treats every class equally regardless of class size?", "opts": ["Macro average", "Weighted average", "Accuracy only", "RMSE"], "ans": 0}},
{"id": "L26", "section": "NLP", "title": "NLP Pipeline with TF-IDF", "difficulty": "Intermediate", "duration": "18 min", "description": "Build a text classification pipeline using TF-IDF and Logistic Regression.", "concepts": ["TfidfVectorizer", "text classification", "NLP", "LogisticRegression"], "code": "from sklearn.pipeline import Pipeline\nfrom sklearn.feature_extraction.text import TfidfVectorizer\nfrom sklearn.linear_model import LogisticRegression\nfrom sklearn.metrics import classification_report\n\npipe = Pipeline([\n    (&quot;tfidf&quot;, TfidfVectorizer(stop_words=&quot;english&quot;, max_features=10000, ngram_range=(1,2))),\n    (&quot;model&quot;, LogisticRegression(max_iter=1000, class_weight=&quot;balanced&quot;))\n])\n\npipe.fit(X_train_text, y_train)\ny_pred = pipe.predict(X_test_text)\nprint(classification_report(y_test, y_pred))\n", "output": "TF-IDF text pipeline trained\nClassification report printed", "explanation": {"why": "TF-IDF converts text into numeric features that reflect how important words are in documents. A Pipeline keeps vectorisation and modelling together.", "params": [{"n": "max_features", "d": "Limits vocabulary size to the most useful terms."}, {"n": "ngram_range=(1,2)", "d": "Uses single words and two-word phrases."}, {"n": "class_weight=\"balanced\"", "d": "Useful for imbalanced text categories."}], "watchout": "Never fit TF-IDF on the full text dataset before splitting. That leaks vocabulary statistics from the test set."}, "quiz": {"q": "What does TF-IDF do?", "opts": ["Converts text into numerical features", "Deletes all labels", "Creates images", "Tunes max_depth"], "ans": 0}},
{"id": "L27", "section": "Advanced", "title": "Time-Aware Splitting & Temporal Leakage", "difficulty": "Advanced", "duration": "16 min", "description": "Handle datasets where time matters and random splitting would leak future information.", "concepts": ["time split", "temporal leakage", "TimeSeriesSplit", "date features"], "code": "from sklearn.model_selection import TimeSeriesSplit\n\n# Sort by date before splitting\ndf = df.sort_values(&quot;date&quot;)\nX = df.drop(columns=[&quot;target&quot;])\ny = df[&quot;target&quot;]\n\nsplit_point = int(len(df) * 0.8)\nX_train, X_test = X.iloc[:split_point], X.iloc[split_point:]\ny_train, y_test = y.iloc[:split_point], y.iloc[split_point:]\n\ncv = TimeSeriesSplit(n_splits=5)\n", "output": "Data sorted by date\nPast used for training, future used for testing\nTimeSeriesSplit configured", "explanation": {"why": "When data has a time order, random splitting can train on the future and test on the past. That gives unrealistic performance.", "params": [{"n": "sort_values(\"date\")", "d": "Ensures chronological order."}, {"n": "time-based holdout", "d": "Trains on older rows and tests on newer rows."}, {"n": "TimeSeriesSplit", "d": "Cross-validation that respects temporal order."}], "watchout": "If the real deployment predicts the future, your evaluation must also test on future-like data."}, "quiz": {"q": "Why can random splitting be wrong for time-ordered data?", "opts": ["It can leak future information into training", "It changes font size", "It prevents scaling", "It deletes dates"], "ans": 0}},
{"id": "L28", "section": "Unsupervised Learning", "title": "Clustering with KMeans and PCA", "difficulty": "Advanced", "duration": "18 min", "description": "Use unsupervised learning to discover structure when no target label exists.", "concepts": ["KMeans", "PCA", "silhouette_score", "unsupervised learning"], "code": "from sklearn.pipeline import Pipeline\nfrom sklearn.preprocessing import StandardScaler\nfrom sklearn.cluster import KMeans\nfrom sklearn.metrics import silhouette_score\nfrom sklearn.decomposition import PCA\n\ncluster_pipe = Pipeline([\n    (&quot;scaler&quot;, StandardScaler()),\n    (&quot;kmeans&quot;, KMeans(n_clusters=3, random_state=42, n_init=&quot;auto&quot;))\n])\nlabels = cluster_pipe.fit_predict(X)\nprint(&quot;Silhouette:&quot;, silhouette_score(X, labels))\n\npca = PCA(n_components=2, random_state=42)\nX_2d = pca.fit_transform(StandardScaler().fit_transform(X))\n", "output": "Cluster labels generated\nSilhouette score printed\n2D PCA representation created", "explanation": {"why": "Unsupervised learning explores patterns without a target. It is useful for segmentation, anomaly exploration and dimensionality reduction.", "params": [{"n": "KMeans", "d": "Groups rows into k clusters."}, {"n": "silhouette_score", "d": "Measures how well-separated clusters are."}, {"n": "PCA", "d": "Compresses features into fewer components for visualisation or modelling."}], "watchout": "Clusters are not automatically meaningful. Always profile clusters and validate them with domain knowledge."}, "quiz": {"q": "What makes unsupervised learning different?", "opts": ["It has no target label", "It cannot use numbers", "It always needs y_test", "It is only for images"], "ans": 0}},
{"id": "L29", "section": "Deployment", "title": "Model Monitoring, Drift & Retraining", "difficulty": "Advanced", "duration": "16 min", "description": "Understand what happens after deployment: data drift, performance decay and retraining triggers.", "concepts": ["monitoring", "data drift", "retraining", "production ML"], "code": "import pandas as pd\n\n# Compare training and new-data distributions\ntrain_mean = X_train.mean(numeric_only=True)\nnew_mean = X_new.mean(numeric_only=True)\nshift = ((new_mean - train_mean).abs() / train_mean.abs()).sort_values(ascending=False)\n\nprint(shift.head(10))\n\n# Simple retraining trigger\nif shift.max() &gt; 0.25:\n    print(&quot;Review needed: possible data drift&quot;)\n", "output": "Top shifted features printed\nReview warning displayed if drift is large", "explanation": {"why": "Deployment is not the end. Real-world data changes, user behaviour changes and model performance can decay. Monitoring tells you when to investigate.", "params": [{"n": "data drift", "d": "Input distribution changes after deployment."}, {"n": "performance drift", "d": "Model metric declines over time."}, {"n": "retraining trigger", "d": "Rule that tells you when to retrain or review."}], "watchout": "Do not retrain automatically without investigation. Drift may reflect data errors, policy changes or real-world shifts."}, "quiz": {"q": "What is data drift?", "opts": ["Change in input data distribution over time", "A type of font", "A missing import", "A metric for regression only"], "ans": 0}},
{"id": "L30", "section": "Deployment", "title": "Free Streamlit Deployment for ML Apps", "difficulty": "Intermediate", "duration": "20 min", "description": "Package a saved pipeline into a simple Streamlit app and deploy with free community tools.", "concepts": ["Streamlit", "joblib", "requirements.txt", "free deployment"], "code": "# app.py\nimport streamlit as st\nimport pandas as pd\nimport joblib\n\nmodel = joblib.load(&quot;models/pipeline_v1.pkl&quot;)\n\nst.title(&quot;Student At-Risk Predictor&quot;)\nscore = st.number_input(&quot;Average score&quot;, 0, 100, 55)\nattendance = st.number_input(&quot;Attendance %&quot;, 0, 100, 80)\n\nrow = pd.DataFrame({&quot;avg_score&quot;:[score], &quot;attendance_pct&quot;:[attendance]})\nif st.button(&quot;Predict&quot;):\n    pred = model.predict(row)[0]\n    st.write(&quot;At risk&quot; if pred == 1 else &quot;Not at risk&quot;)\n", "output": "Streamlit app structure created\nLoads saved pipeline\nCollects inputs and predicts", "explanation": {"why": "Streamlit is a practical free option for ML demos. It lets stakeholders interact with a model without touching notebooks.", "params": [{"n": "app.py", "d": "Main Streamlit file."}, {"n": "requirements.txt", "d": "Lists Python packages needed by the app."}, {"n": "joblib.load", "d": "Loads the saved pipeline for prediction."}], "watchout": "Never ask users to enter features your deployed pipeline was not trained to receive."}, "quiz": {"q": "What file usually lists packages for Streamlit deployment?", "opts": ["requirements.txt", "target.csv", "README.png", "secret_api_key.txt"], "ans": 0}},
{"id": "L31", "section": "Advanced", "title": "Capstone Project Documentation & Portfolio Storytelling", "difficulty": "Advanced", "duration": "20 min", "description": "Turn a model into a portfolio-ready project with problem framing, evidence, limitations and deployment notes.", "concepts": ["README", "model card", "limitations", "portfolio"], "code": "# Recommended README structure\nsections = [\n    &quot;Problem Statement&quot;,\n    &quot;Dataset and Data Dictionary&quot;,\n    &quot;EDA Summary&quot;,\n    &quot;Modelling Approach&quot;,\n    &quot;Evaluation Metrics&quot;,\n    &quot;Interpretability&quot;,\n    &quot;Limitations and Risks&quot;,\n    &quot;Deployment Instructions&quot;,\n    &quot;How to Run Locally&quot;\n]\n\nfor section in sections:\n    print(&quot;##&quot;, section)\n", "output": "README section outline printed", "explanation": {"why": "A strong data science portfolio is not just a notebook. It tells the story of the problem, the data, the decisions, the errors, the limitations and the impact.", "params": [{"n": "Problem Statement", "d": "Explains why the project matters."}, {"n": "Evaluation Metrics", "d": "Shows honest performance, not vanity accuracy."}, {"n": "Limitations", "d": "Builds trust by stating what the model cannot guarantee."}], "watchout": "Do not hide weak metrics or failed experiments. Honest documentation is a professional strength."}, "quiz": {"q": "Which README section builds trust by stating what the model cannot do?", "opts": ["Limitations and Risks", "Font Choices", "Laptop Specification", "Emoji List"], "ans": 0}},
{"id": "L32", "section": "Responsible ML", "title": "Ethics, Bias & Human-in-the-Loop Decisions", "difficulty": "Advanced", "duration": "18 min", "description": "Build responsible models by checking fairness, bias, human oversight and misuse risks.", "concepts": ["ethics", "bias", "fairness", "human-in-the-loop"], "code": "# Example: compare recall by group\nfor group, part in df_test.groupby(&quot;school_type&quot;):\n    y_true = part[&quot;y_true&quot;]\n    y_pred = part[&quot;y_pred&quot;]\n    recall = ((y_true == 1) &amp; (y_pred == 1)).sum() / max((y_true == 1).sum(), 1)\n    print(group, &quot;recall:&quot;, round(recall, 3))\n", "output": "Recall printed for each school_type group", "explanation": {"why": "Responsible ML asks who may be harmed by the model. In education, finance or health, model errors affect real people and must be reviewed carefully.", "params": [{"n": "group metrics", "d": "Compare performance across important groups."}, {"n": "human-in-the-loop", "d": "A human reviews model recommendations before action."}, {"n": "misuse risk", "d": "How the model could be applied outside its valid context."}], "watchout": "A model should support human decision-making, not replace accountability in high-stakes contexts."}, "quiz": {"q": "What does human-in-the-loop mean?", "opts": ["Humans review or approve model-supported decisions", "The model writes its own target", "The app requires no users", "The computer becomes a teacher"], "ans": 0}}
];

function render() {
  const content = document.getElementById('pageContent');
  content.className = 'page page-fade';
  const pages = {
    dashboard:    renderDashboard,
    learn:        renderLearn,
    curriculum:   renderCurriculumHub,

function attachEvents() {
  // Range inputs live update
  document.querySelectorAll('input[type="range"]').forEach(el => {
    el.addEventListener('input', function() {
      const display = document.getElementById('val_'+this.id);
      if (display) display.textContent = this.value;
      if (this.dataset.param) {
        STATE.playgroundParams[this.dataset.param] = parseFloat(this.value);
        const codeEl = document.getElementById('playgroundCode');
        if (codeEl) codeEl.innerHTML = buildPlaygroundCode();
      }
    });
  });
  // Scratchpad textarea
  const sta = document.getElementById('scratchArea');
  if (sta) {
    sta.addEventListener('input', function() {
      const t = STATE.scratchpad.find(t => t.id === STATE.activeScratchTab);
      if (t) { t.content = this.value; saveScratch(); }
      const wc = document.getElementById('scratchStats');
      if (wc) wc.textContent = `${this.value.split('\n').length} lines · ${this.value.length} chars`;
    });
  }
  // Error decoder textarea
  const ei = document.getElementById('errorInput');
  if (ei) ei.addEventListener('input', function() { STATE.errorInput = this.value; });
  // Quiz answer buttons
  document.querySelectorAll('.qa-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      if (STATE.quizRevealed) return;
      handleQuizAnswer(parseInt(this.dataset.idx));
    });
  });
  // Session timer interval restore
  if (STATE.timerRunning && STATE.page === 'timer') startTimerInterval();
}

    });
  });
  const sta=document.getElementById('scratchArea');
  if(sta){ sta.addEventListener('input',function(){const t=STATE.scratchpad.find(t=>t.id===STATE.activeScratchTab);if(t){t.content=this.value;saveScratch();}const wc=document.getElementById('scratchStats');if(wc)wc.textContent=`${this.value.split('\n').length} lines · ${this.value.length} chars`;});}
  const ei=document.getElementById('errorInput');

}

function renderPractice() {
  const ex = EXERCISES[STATE.activePractice];
  const answers = STATE.practiceAnswers;
  const checked = STATE.practiceChecked;
  const done = EXERCISES.filter(e=>STATE.progress[e.id]).length;
  let results = {};
  if (checked) ex.blanks.forEach(b=>{ results[b.id]=(answers[b.id]||'').trim().toLowerCase()===b.ans.toLowerCase(); });
  const allCorrect = checked && ex.blanks.every(b=>results[b.id]);
  const allAnswered = ex.blanks.every(b=>(answers[b.id]||'').trim());

  const lines = ex.template.split('\n');
  let codeHtml = '';
  lines.forEach(line => {
    const parts = line.split(/(___B\d+___)/g);
    let lineHtml = '';
    parts.forEach(part => {
      const m = part.match(/___B(\d+)___/);
      if (m) {
        const bid = 'B'+m[1];
        const blank = ex.blanks.find(b=>b.id===bid);
        const isCorrect = results[bid];
        const isWrong = checked && !results[bid];
        const w = Math.max(100,(blank.ans.length*9)+20);
        lineHtml += `<input type="text" id="inp_${bid}" placeholder="${blank.hint}" value="${answers[bid]||''}" onchange="STATE.practiceAnswers['${bid}']=this.value" style="display:inline-block;width:${w}px;background:${checked?(isCorrect?'rgba(0,229,160,.1)':'rgba(255,107,107,.1)'):'rgba(79,138,255,.1)'};border:1px solid ${checked?(isCorrect?'var(--green)':'var(--red)'):'var(--accent)'};border-radius:4px;padding:0 6px;height:22px;font-size:11.5px;font-family:'Space Mono',monospace;color:${checked?(isCorrect?'var(--green)':'var(--red)'):'var(--accent3)'};vertical-align:middle;outline:none"/>`;
      } else {
        lineHtml += part.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }
    });
    codeHtml += `<div>${lineHtml}</div>`;
  });

  return `
<div class="page-header">

    ${EXERCISES.map((e,i)=>`<div class="topic-item ${STATE.activePractice===i?'active':''}" onclick="STATE.activePractice=${i};STATE.practiceAnswers={};STATE.practiceChecked=false;render()">
      <div class="topic-check ${STATE.progress[e.id]?'done':''}">${STATE.progress[e.id]?'✓':''}</div>

    </div>`).join('')}
  </div>
  <div>
    <div class="card mb-16">
      <div class="fb mb-14">
        <div><div style="font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px">${ex.section}</div><h2 style="font-size:18px">${ex.title}</h2></div>
        <span class="badge ${ex.difficulty==='Beginner'?'badge-green':'badge-yellow'}">${ex.difficulty}</span>
      </div>
      <p style="color:var(--text2);font-size:13px;margin-bottom:18px">${ex.desc}</p>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:7px;margin-bottom:18px">
        ${ex.blanks.map(b=>`<div style="background:var(--surface2);border-radius:6px;padding:7px 10px;font-size:11px"><div style="color:var(--accent);font-family:'Space Mono',monospace;margin-bottom:2px">${b.id}</div><div style="color:var(--text3)">${b.label}</div></div>`).join('')}
      </div>
      <div class="editor-wrap">

      </div>

    <div class="explain-panel"><h4>💡 Explanation</h4><p>${ex.expl}</p></div>

function buildPlaygroundCode() {
  const m = PLAYGROUND_MODELS[STATE.playgroundModel];
  const p = STATE.playgroundParams;
  const pLines = m.params.map(pm => {
    const v = p[pm.key] !== undefined ? p[pm.key] : pm.default;
    const vStr = isNaN(v) ? `"${v}"` : v;
    return `    ${pm.key}=${vStr}`;
  }).join(',\n');
  return `<span class="kw">from</span> <span class="cls">${m.module}</span> <span class="kw">import</span> <span class="cls">${m.name}</span>\n\n<span class="var">model</span> <span class="op">=</span> <span class="cls">${m.name}</span>(\n${pLines},\n    <span class="param">random_state</span><span class="op">=</span><span class="num">42</span>\n)\n\n<span class="var">model</span><span class="op">.</span><span class="fn">fit</span>(<span class="var">X_train</span>, <span class="var">y_train</span>)\n<span class="var">y_pred</span> <span class="op">=</span> <span class="var">model</span><span class="op">.</span><span class="fn">predict</span>(<span class="var">X_test</span>)`;
}

function renderPlayground() {
  const mid = STATE.playgroundModel;
  const m = PLAYGROUND_MODELS[mid];
  if (!STATE.playgroundParams || Object.keys(STATE.playgroundParams).length===0) {
    m.params.forEach(p => { STATE.playgroundParams[p.key] = p.default; });
  }
  const p = STATE.playgroundParams;
  const base = {rf:0.82,lr:0.80,gb:0.84,svc:0.81,ridge:0.74,lasso:0.73};
  let acc = base[mid]||0.80;
  if (mid==='gb'&&p.learning_rate<=0.05) acc+=0.01;
  if (mid==='gb'&&p.learning_rate>=0.5) acc-=0.02;
  if (mid==='lr'&&parseFloat(p.C)<=0.1) acc-=0.02;

  return `
<div class="page-header">
  <div class="tag">Model Playground</div>
  <h1>Configure & Explore Models</h1>
  <p>Adjust hyperparameters with sliders — the Python code updates live. Simulate training to see estimated performance and experiment suggestions.</p>
</div>
<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px">
  ${Object.keys(PLAYGROUND_MODELS).map(k=>`<button class="btn btn-sm ${mid===k?'btn-primary':'btn-ghost'}" onclick="STATE.playgroundModel='${k}';STATE.playgroundParams={};STATE.playgroundRan=false;render()">${PLAYGROUND_MODELS[k].name}</button>`).join('')}
</div>
<div style="display:grid;grid-template-columns:280px 1fr;gap:22px">
  <div class="card">
    <h3 style="margin-bottom:18px">⚙️ Hyperparameters</h3>
    ${m.params.map(pm=>{
      const v = p[pm.key]!==undefined?p[pm.key]:pm.default;
      return `<div style="margin-bottom:18px">
        <div class="param-label"><span class="param-name">${pm.label}</span><span class="param-val" id="val_inp_${pm.key}">${v}</span></div>
        ${pm.type==='range'?`<input type="range" id="inp_${pm.key}" min="${pm.min}" max="${pm.max}" step="${pm.step}" value="${v}" data-param="${pm.key}" style="width:100%"/>`:
        `<select id="inp_${pm.key}" onchange="STATE.playgroundParams['${pm.key}']=this.value;document.getElementById('playgroundCode').innerHTML=buildPlaygroundCode()">${pm.opts.map(o=>`<option ${v==o?'selected':''}>${o}</option>`).join('')}</select>`}
        <div style="font-size:11px;color:var(--text3);margin-top:4px;line-height:1.5">${pm.desc}</div>
      </div>`;
    }).join('')}
    <button class="btn btn-primary" style="width:100%;margin-top:6px" onclick="STATE.playgroundRan=true;render()">▶ Simulate Training</button>
  </div>
  <div>
    <div class="code-label">Live Code (updates as you adjust params)</div>
    <div class="code-block" id="playgroundCode" style="margin-bottom:18px">${buildPlaygroundCode()}</div>
    ${STATE.playgroundRan?`
    <h3 style="margin-bottom:14px">📊 Estimated Performance</h3>
    <div class="info-box note" style="margin-bottom:14px"><strong>Note</strong>Illustrative estimates — actual results depend on your dataset.</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px">
      ${[{l:'Accuracy',v:(Math.min(.99,acc)).toFixed(3),c:'var(--accent)'},{l:'F1 Score',v:(Math.min(.99,acc-.15)).toFixed(3),c:'var(--purple)'},{l:'ROC-AUC',v:(Math.min(.99,acc+.04)).toFixed(3),c:'var(--green)'},{l:'Train Time',v:'~'+(Math.random()*2+0.5).toFixed(1)+'s',c:'var(--yellow)'}].map(s=>`<div class="metric-card"><div class="metric-val" style="color:${s.c}">${s.v}</div><div class="metric-lbl">${s.l}</div></div>`).join('')}
    </div>
    <div class="card"><h4 style="margin-bottom:10px;color:var(--accent3)">🧪 Experiment Suggestions</h4><ul style="color:var(--text2);font-size:13px;padding-left:18px;line-height:2.1">
      ${mid==='rf'?'<li>Try n_estimators=10 vs 500 — watch stability change</li><li>Set max_depth=2 (underfit) vs None (may overfit)</li><li>Compare class_weight="balanced" vs None on imbalanced data</li>':
        mid==='gb'?'<li>Try learning_rate=0.01 + n_estimators=500 — slow but strong</li><li>learning_rate=0.5 is fast but prone to overfit</li><li>Keep max_depth ≤ 5 for best GB results</li>':
        mid==='lr'?'<li>C=0.001 (very regularised) vs C=100 (very flexible)</li><li>penalty="l1" zeros out some coefficients — feature selection</li><li>Increase max_iter if ConvergenceWarning appears</li>':
        '<li>Adjust parameters and observe code updates live</li><li>Compare default vs custom settings</li><li>Think about which parameters matter most for your use case</li>'}
    </ul></div>`:
    `<div class="card" style="text-align:center;padding:48px;background:rgba(79,138,255,.03)"><div style="font-size:48px;margin-bottom:14px">🧪</div><h3 style="margin-bottom:8px">Configure your model</h3><p style="color:var(--text3)">Adjust hyperparameters on the left, then click "Simulate Training" to see estimated performance.</p></div>`}
  </div>
</div>`;
}

function exportProgress() {
  const p = STATE.progress;
  const lDone = LESSONS.filter(l=>p[l.id]).length;
  const lines = ['ML Lab — Progress Report','Exported: '+new Date().toLocaleString(),'','Overall: '+lDone+'/'+LESSONS.length+' lessons','','=== LESSONS ===',
    ...LESSONS.map(l=>`[${p[l.id]?'✓':' '}] ${l.id} — ${l.title}`),
    '','=== EXERCISES ===',
    ...['P01','P02','P03','P04','P05','P06','P07','P08'].map(id=>`[${p[id]?'✓':' '}] ${id}`),
    '','=== MILESTONES ===',
    ...MILESTONES.map(m=>`[${m.condition(p)?'✓':' '}] ${m.label}`)];
  const blob = new Blob([lines.join('\n')],{type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='ml_lab_progress.txt'; a.click();
  URL.revokeObjectURL(url);
}

const GLOSSARY = [
{t:'Accuracy',cat:'Metric',l:'A',def:'Correct predictions / total. Misleading on imbalanced data — a model predicting the majority class always gets high accuracy while catching zero minority samples.',ex:'accuracy_score(y_test, y_pred)'},
{t:'AUC (ROC-AUC)',cat:'Metric',l:'A',def:'Area Under the ROC Curve. Measures how well the model ranks positives above negatives across all thresholds. 0.5=random, 1.0=perfect. Requires probabilities, not labels.',ex:'roc_auc_score(y_test, y_prob)'},
{t:'Bagging',cat:'Ensemble',l:'B',def:'Bootstrap Aggregating. Trains many models on random subsets (with replacement) and averages predictions. Reduces variance. Random Forest is the most famous bagging algorithm.',ex:'BaggingClassifier(n_estimators=100)'},
{t:'Bias-Variance Tradeoff',cat:'Theory',l:'B',def:'Bias = error from wrong assumptions (underfitting). Variance = sensitivity to training data (overfitting). Increasing complexity reduces bias but raises variance. Find the sweet spot.',ex:'# High bias: max_depth=1 | High variance: max_depth=None'},
{t:'class_weight',cat:'Hyperparameter',l:'C',def:'"balanced" tells the model to weight each class inversely proportional to its frequency. Fixes the problem where models ignore the minority class (e.g. churners).',ex:'RandomForestClassifier(class_weight="balanced")'},
{t:'ColumnTransformer',cat:'Pipeline',l:'C',def:'Applies different transformers to different column subsets simultaneously, then concatenates results. The engine inside a sklearn Pipeline for mixed-type datasets.',ex:'ColumnTransformer([("num", scaler, num_cols), ("cat", enc, cat_cols)])'},
{t:'C (Regularisation)',cat:'Hyperparameter',l:'C',def:'Inverse of regularisation strength in LogisticRegression and SVC. Low C = strong regularisation = simpler model. High C = weak regularisation = may overfit. Default=1.0.',ex:'LogisticRegression(C=0.1)  # strong regularisation'},
{t:'cross_val_score',cat:'sklearn API',l:'C',def:'Splits training data into k folds, trains on k-1, tests on 1, repeats k times. Returns k scores. Use .mean() and .std(). Far more reliable than a single train/test split.',ex:'cross_val_score(model, X_train, y_train, cv=5, scoring="f1").mean()'},
{t:'Data Leakage',cat:'Concept',l:'D',def:'When information from the test/future set leaks into training, making evaluation unrealistically optimistic. Most common form: calling fit_transform() on X_test instead of transform().',ex:'# WRONG: scaler.fit_transform(X_test)\n# RIGHT: scaler.transform(X_test)'},
{t:'Estimator',cat:'sklearn API',l:'E',def:'Any sklearn object that implements fit(). Both transformers (scalers, encoders) and predictors (models) are estimators. Universal interface: instantiate → fit → predict/transform.',ex:'model = RandomForestClassifier()\nmodel.fit(X_train, y_train)'},
{t:'F1 Score',cat:'Metric',l:'F',def:'Harmonic mean of Precision and Recall: 2×(P×R)/(P+R). Best single metric for imbalanced classification. Equally penalises low precision AND low recall.',ex:'f1_score(y_test, y_pred)\nf1_score(y_test, y_pred, average="weighted")  # multiclass'},
{t:'feature_importances_',cat:'sklearn API',l:'F',def:'Post-fit attribute of tree-based models. Array showing mean decrease in impurity per feature across all trees (values sum to 1). Higher = more important.',ex:'pd.Series(rf.feature_importances_, index=X.columns).sort_values(ascending=False)'},
{t:'fit()',cat:'sklearn API',l:'F',def:'The learning step. The estimator reads X_train (and y_train) and stores learned parameters. Always called ONLY on training data. Returns the estimator itself.',ex:'scaler.fit(X_train)\nmodel.fit(X_train, y_train)'},
{t:'fit_transform()',cat:'sklearn API',l:'F',def:'Calls fit() then transform() in one step. Use ONLY on X_train — never on X_test. Calling on X_test causes data leakage.',ex:'X_train_sc = scaler.fit_transform(X_train)  # OK\nX_test_sc  = scaler.transform(X_test)       # correct'},
{t:'GridSearchCV',cat:'sklearn API',l:'G',def:'Exhaustive search over all param_grid combinations using cross-validation. After fit(): best_params_ (winning config), best_score_ (CV score), best_estimator_ (fitted model).',ex:'GridSearchCV(rf, {"n_estimators":[100,200],"max_depth":[3,5]}, cv=5, scoring="f1")'},
{t:'Hyperparameter',cat:'Concept',l:'H',def:'Configuration settings set BEFORE training (n_estimators, C, max_depth). Cannot be learned from data. Contrast with parameters (weights, coef_) which ARE learned during fit().',ex:'# Hyperparameter: n_estimators=100 (you set)\n# Parameter: feature_importances_ (model learns)'},
{t:'Imputer (SimpleImputer)',cat:'sklearn API',l:'I',def:'Fills missing values (NaN) using a statistical strategy: "mean", "median", "most_frequent", or "constant". Must be fitted on X_train only.',ex:'SimpleImputer(strategy="median").fit_transform(X_train)'},
{t:'joblib',cat:'Library',l:'J',def:'Library for saving and loading Python objects. Faster than pickle for sklearn models with large numpy arrays. Standard tool for model persistence and deployment.',ex:'joblib.dump(pipeline, "model.pkl")\nloaded = joblib.load("model.pkl")'},
{t:'LabelEncoder',cat:'sklearn API',l:'L',def:'Converts text labels to integers alphabetically. Use ONLY for the target variable y or binary columns. Never for multi-class feature columns — implies false ordering.',ex:'le = LabelEncoder()\ny_enc = le.fit_transform(y)  # ["No","Yes"] → [0,1]'},
{t:'MAE',cat:'Metric',l:'M',def:'Mean Absolute Error. Average of |predicted - actual|. Interpretable in original units. Less sensitive to outliers than RMSE. Formula: (1/n) × Σ|yᵢ - ŷᵢ|',ex:'mean_absolute_error(y_test, y_pred)'},
{t:'Overfitting',cat:'Concept',l:'O',def:'Model memorises training data — performs well on train but poorly on test. Signs: high train accuracy, low test accuracy. Fixes: regularisation, pruning (max_depth), more data.',ex:'# Train acc=0.99, Test acc=0.72 → likely overfitting'},
{t:'OLS',cat:'statsmodels',l:'O',def:'Ordinary Least Squares. Minimises sum of squared residuals. In statsmodels: OLS(y, X) gives full statistical output — p-values, R², AIC. Remember: y first, then X. Always add_constant(X).',ex:'sm.OLS(y_train, sm.add_constant(X_train)).fit().summary()'},
{t:'OneHotEncoder',cat:'sklearn API',l:'O',def:'Converts nominal categorical columns to binary matrix — one column per category. Use drop="first" to avoid dummy variable trap. handle_unknown="ignore" for deployment.',ex:'OneHotEncoder(drop="first", handle_unknown="ignore")'},
{t:'p-value',cat:'statsmodels',l:'P',def:'In statsmodels regression, the p-value tests whether the coefficient is significantly different from zero. p < 0.05 = significant. p > 0.05 = consider dropping the feature.',ex:'result.pvalues  # after OLS fit()'},
{t:'Pipeline',cat:'sklearn API',l:'P',def:'Chains preprocessing steps and a final estimator into one object. fit() runs every step on X_train. predict() applies every transformation to new data automatically. Eliminates leakage.',ex:'Pipeline([("scaler", StandardScaler()), ("model", LogisticRegression())])'},
{t:'predict()',cat:'sklearn API',l:'P',def:'After fit(), generates predictions on new data. Classifiers return class labels. Regressors return numeric values. Always called on X_test for final evaluation.',ex:'y_pred = model.predict(X_test)'},
{t:'predict_proba()',cat:'sklearn API',l:'P',def:'Returns class probabilities. Shape (n_samples, n_classes). Column [:,1] = P(positive). Required for roc_auc_score(). Set probability=True for SVC.',ex:'y_prob = model.predict_proba(X_test)[:, 1]'},
{t:'R² (R-squared)',cat:'Metric',l:'R',def:'Proportion of variance explained by the model. 1.0=perfect. 0=predicts the mean. Negative=worse than the mean (serious problem). Formula: 1 - SS_res/SS_tot',ex:'r2_score(y_test, y_pred)'},
{t:'RandomForestClassifier',cat:'Model',l:'R',def:'Ensemble of decision trees trained on random data subsets (bagging) + random feature subsets. Votes across trees. Robust, no scaling needed, gives feature_importances_.',ex:'RandomForestClassifier(n_estimators=100, class_weight="balanced", n_jobs=-1)'},
{t:'Recall',cat:'Metric',l:'R',def:'Of all actual positive samples, what fraction did the model catch? TP / (TP + FN). High recall = fewer missed positives. Critical for medical diagnosis and churn detection.',ex:'recall_score(y_test, y_pred)'},
{t:'RobustScaler',cat:'sklearn API',l:'R',def:'Scales using median and IQR instead of mean and std. Resistant to outliers. Best choice for salary, income, or population columns with extreme values.',ex:'RobustScaler().fit_transform(X_train)'},
{t:'RMSE',cat:'Metric',l:'R',def:'Root Mean Squared Error. √MSE — back in original units. Penalises large errors more than MAE. Most widely reported regression metric.',ex:'np.sqrt(mean_squared_error(y_test, y_pred))'},
{t:'StandardScaler',cat:'sklearn API',l:'S',def:'Z-score normalisation: z = (x − mean) / std. Result: mean=0, std=1. Best general-purpose scaler. Required for LogReg, SVM, KNN. NOT needed for tree models.',ex:'StandardScaler().fit_transform(X_train)'},
{t:'stratify',cat:'sklearn API',l:'S',def:'In train_test_split, stratify=y ensures both train and test sets have the same class proportion. Critical for imbalanced datasets.',ex:'train_test_split(X, y, test_size=0.2, stratify=y)'},
{t:'transform()',cat:'sklearn API',l:'T',def:'After fit(), applies the learned transformation to new data. For scalers: subtracts learned mean, divides by learned std. Apply on both X_train and X_test.',ex:'X_test_sc = scaler.transform(X_test)  # uses X_train stats'},
{t:'Underfitting',cat:'Concept',l:'U',def:'Model too simple to capture patterns. Both train and test accuracy are low. Fixes: more features, more complex model, less regularisation (higher C), more data.',ex:'# Train acc=0.65, Test acc=0.63 → underfitting'},
];

function renderGlossary() {
  const search = (STATE.filterSearch||'').toLowerCase();
  const catFilter = STATE.filterSection||'All';
  const cats = ['All',...new Set(GLOSSARY.map(g=>g.cat))];
  const filtered = GLOSSARY.filter(g=>(catFilter==='All'||g.cat===catFilter)&&(!search||g.t.toLowerCase().includes(search)||g.def.toLowerCase().includes(search)));
  const letters = [...new Set(filtered.map(g=>g.l))].sort();

  return `
<div class="page-header">
  <div class="tag">Glossary</div>
  <h1>ML & sklearn Glossary</h1>
  <p>${GLOSSARY.length} terms — every concept, API, and hyperparameter explained in plain English with code examples.</p>
</div>
<div style="display:flex;gap:10px;margin-bottom:13px;flex-wrap:wrap">
  <input type="text" placeholder="Search terms..." value="${STATE.filterSearch||''}" oninput="STATE.filterSearch=this.value;render()" style="flex:1;min-width:180px"/>
</div>
<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:22px">
  ${cats.map(c=>`<button class="btn btn-sm ${catFilter===c?'btn-primary':'btn-ghost'}" onclick="STATE.filterSection='${c}';render()">${c}</button>`).join('')}
</div>
${filtered.length===0?`<div style="text-align:center;padding:48px;color:var(--text3)"><div style="font-size:36px;margin-bottom:12px">🔍</div><p>No results for "${STATE.filterSearch}"</p></div>`:''}
${letters.map(letter=>`
<div class="glossary-letter">${letter}</div>
${filtered.filter(g=>g.l===letter).map(g=>`
<div class="glossary-term ${STATE.glossaryExpanded[g.t]?'expanded':''}" onclick="STATE.glossaryExpanded['${g.t}']=!STATE.glossaryExpanded['${g.t}'];render()">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <span style="font-weight:600;font-size:13.5px">${g.t}</span>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="badge badge-blue">${g.cat}</span>
      <button class="btn btn-ghost btn-sm" style="font-size:10px;padding:3px 8px" onclick="event.stopPropagation();bookmarkGlossary('${g.t}')">${isBookmarked('glossary_'+g.t)?'★':'☆'}</button>
      <span style="color:var(--text3);font-size:12px">${STATE.glossaryExpanded[g.t]?'▲':'▼'}</span>
    </div>
  </div>
  ${STATE.glossaryExpanded[g.t]?`
  <div style="color:var(--text2);font-size:13.5px;margin-top:10px;line-height:1.75">${g.def}</div>
  <div style="margin-top:10px"><div class="code-label" style="margin-bottom:5px">Example</div>
  <div class="code-block" style="padding:9px 13px;font-size:11px"><code style="color:var(--accent3);font-family:'Space Mono',monospace;white-space:pre-wrap">${g.ex}</code></div></div>`:''}
</div>`).join('')}`).join('')}`;
}
